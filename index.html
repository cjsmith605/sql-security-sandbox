<style>
  :root {
    --bg: #0F1923; --card: #1A2535; --card2: #1E2D42;
    --teal: #00C9A7; --blue: #2E74B5; --gold: #F0C040;
    --text: #E8EDF2; --muted: #8A9BB0; --border: #2A3A52;
    --sql-bg: #1A1A2E; --correct: #1A3A2A; --warn: #3A2A1A;
    --red: #FF8080; --green: #70E8A0; --purple: #C09FE8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Calibri, sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #0A1525 0%, #1A2535 100%); border-bottom: 2px solid var(--teal); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 1.2rem; font-weight: 700; color: var(--teal); letter-spacing: 1px; }
  .logo span { color: var(--gold); }
  .subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .save-indicator { font-size: 0.72rem; color: var(--muted); opacity: 0; transition: opacity 0.3s; letter-spacing: 0.3px; }
  .save-indicator.visible { opacity: 1; color: var(--teal); }
  .save-indicator::before { content: '\25CF '; font-size: 0.6rem; }
  .btn-reset { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 6px 14px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.2s; }
  .btn-reset:hover { color: var(--red); border-color: var(--red); background: rgba(255,128,128,0.05); }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 70px); }
  .sidebar { width: 270px; background: var(--card); border-right: 1px solid var(--border); padding: 20px 0; flex-shrink: 0; overflow-y: auto; }
  .main { flex: 1; padding: 32px; max-width: 900px; overflow-y: auto; }

  /* SIDEBAR */
  .module-btn { display: block; width: 100%; padding: 10px 20px; background: none; border: none; color: var(--muted); text-align: left; cursor: pointer; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.2s; }
  .module-btn:hover { color: var(--teal); background: rgba(0,201,167,0.05); }
  .module-btn.active { color: var(--teal); border-left: 3px solid var(--teal); background: rgba(0,201,167,0.08); }
  .lesson-btn { display: block; width: 100%; padding: 8px 20px 8px 32px; background: none; border: none; color: var(--muted); text-align: left; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
  .lesson-btn:hover { color: var(--text); }
  .lesson-btn.active { color: var(--teal); font-weight: 600; }
  .lesson-btn.done::before { content: '\2713 '; color: var(--teal); }

  /* PROGRESS */
  .progress-bar { background: var(--border); border-radius: 4px; height: 6px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--blue)); border-radius: 4px; transition: width 0.5s ease; }
  .progress-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }

  /* BADGES */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  .badge-intro { background: rgba(46,116,181,0.2); color: #6AB0E8; border: 1px solid rgba(46,116,181,0.3); }
  .badge-dive { background: rgba(0,201,167,0.15); color: var(--teal); border: 1px solid rgba(0,201,167,0.25); }
  .badge-scenario { background: rgba(240,192,64,0.15); color: var(--gold); border: 1px solid rgba(240,192,64,0.25); }
  .badge-demo { background: rgba(150,80,220,0.15); color: #C09FE8; border: 1px solid rgba(150,80,220,0.25); }
  .badge-exercise { background: rgba(255,120,80,0.15); color: #FF9070; border: 1px solid rgba(255,120,80,0.25); }
  .badge-answer { background: rgba(30,100,50,0.3); color: #70E8A0; border: 1px solid rgba(30,150,80,0.4); }
  .badge-protip { background: rgba(150,80,220,0.2); color: #C09FE8; border: 1px solid rgba(150,80,220,0.3); }
  .badge-ref { background: rgba(46,116,181,0.15); color: #6AB0E8; border: 1px solid rgba(46,116,181,0.25); }

  /* CONTENT */
  .lesson-title { font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .lesson-module { font-size: 0.82rem; color: var(--teal); margin-bottom: 24px; font-weight: 600; }
  .section-block { margin-bottom: 28px; }
  .section-block h3 { font-size: 1.05rem; margin-bottom: 10px; color: var(--text); }
  .section-block p { color: var(--muted); line-height: 1.75; font-size: 0.95rem; margin-bottom: 8px; }
  .section-block ul, .section-block ol { padding-left: 20px; color: var(--muted); line-height: 1.9; font-size: 0.95rem; }
  .section-block li { margin-bottom: 4px; }
  strong { color: var(--text); }
  code { background: rgba(0,201,167,0.1); color: var(--teal); padding: 1px 6px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.9em; }

  /* BOXES */
  .scenario-box { background: rgba(240,192,64,0.06); border: 1px solid rgba(240,192,64,0.2); border-left: 4px solid var(--gold); border-radius: 8px; padding: 16px 20px; margin-top: 10px; }
  .scenario-box p { color: #D4BE80; margin-bottom: 6px; font-size: 0.93rem; }
  .protip-box { background: rgba(150,80,220,0.06); border: 1px solid rgba(150,80,220,0.2); border-left: 4px solid var(--purple); border-radius: 8px; padding: 16px 20px; margin-top: 10px; }
  .protip-box p { color: #C8B0E8; margin-bottom: 6px; font-size: 0.93rem; }
  .ref-box { background: rgba(46,116,181,0.06); border: 1px solid rgba(46,116,181,0.2); border-left: 4px solid var(--blue); border-radius: 8px; padding: 12px 16px; margin: 10px 0; }
  .ref-box p { color: #90B8D8; font-size: 0.88rem; margin-bottom: 4px; }

  /* CODE BLOCKS */
  .code-block { background: var(--sql-bg); border: 1px solid #2A2A4A; border-radius: 8px; padding: 16px 20px; font-family: 'Courier New', monospace; font-size: 0.88rem; overflow-x: auto; margin: 10px 0; color: #A8D8F0; line-height: 1.6; white-space: pre-wrap; }
  .kw { color: #FF79C6; font-weight: bold; }
  .str { color: #F1FA8C; }
  .num { color: #BD93F9; }
  .cm { color: #7A8DB8; }
  .fn { color: #50FA7B; }

  /* DATA TABLES */
  .data-table-wrap { overflow-x: auto; margin: 12px 0; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .data-table th { background: #1F3864; color: #A8D8F0; padding: 8px 12px; text-align: left; font-weight: 600; border: 1px solid var(--border); }
  .data-table td { padding: 7px 12px; border: 1px solid var(--border); color: var(--muted); }
  .data-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .data-table tr:hover td { background: rgba(0,201,167,0.04); }
  .val-s { color: #70E8A0; font-weight: 600; }
  .val-f { color: #FF8080; font-weight: 600; }
  .val-w { color: var(--gold); font-weight: 600; }

  /* SYNTAX-HIGHLIGHTED EDITOR */
  .editor-wrap { position: relative; margin: 10px 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); transition: border 0.2s; }
  .editor-wrap.focused { border-color: var(--teal); }
  .editor-highlight, .editor-input {
    font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.6;
    padding: 14px 16px; margin: 0; border: none; white-space: pre-wrap;
    word-wrap: break-word; overflow: auto; min-height: 100px;
  }
  .editor-highlight {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: #0A1018; color: transparent; pointer-events: none; z-index: 1;
  }
  .editor-input {
    position: relative; z-index: 2; width: 100%; background: transparent;
    color: #FFFFFF; caret-color: var(--teal); resize: vertical;
    outline: none; -webkit-text-fill-color: transparent;
  }
  .editor-highlight .hl-kw { color: #FF79C6; font-weight: bold; }
  .editor-highlight .hl-fn { color: #50FA7B; }
  .editor-highlight .hl-str { color: #F1FA8C; }
  .editor-highlight .hl-num { color: #BD93F9; }
  .editor-highlight .hl-txt { color: #FFFFFF; }
  .editor-highlight .hl-cm { color: #7A8DB8; font-style: italic; }

  /* EXERCISE BOX */
  .exercise-box { background: rgba(255,120,80,0.05); border: 1px solid rgba(255,120,80,0.2); border-radius: 10px; padding: 20px; margin-top: 10px; }
  .exercise-box p { color: #D4A090; margin-bottom: 12px; font-size: 0.95rem; line-height: 1.7; }
  .data-context { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; margin-bottom: 14px; }
  .data-context p { color: var(--muted); font-size: 0.85rem; margin-bottom: 4px; }
  .data-context strong { color: var(--teal); }
  .ex-label { color: var(--gold); font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; }

  /* FEEDBACK */
  .feedback-box { border-radius: 8px; padding: 14px 18px; margin-top: 10px; display: none; }
  .feedback-box.show { display: block; }
  .feedback-correct { background: rgba(30,100,50,0.15); border: 1px solid rgba(30,150,80,0.3); }
  .feedback-correct p { color: #90D8B0; }
  .feedback-wrong { background: rgba(150,40,40,0.15); border: 1px solid rgba(150,60,60,0.3); }
  .feedback-wrong p { color: #E8A0A0; }
  .feedback-hint { background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.2); }
  .feedback-hint p { color: #D4BE80; }

  /* ANSWER REVEAL */
  .answer-box { background: rgba(30,100,50,0.1); border: 1px solid rgba(30,150,80,0.3); border-radius: 10px; padding: 20px; margin-top: 10px; display: none; }
  .answer-box.visible { display: block; }
  .answer-box p { color: #90D8B0; line-height: 1.7; font-size: 0.93rem; margin-bottom: 6px; }

  /* BUTTONS */
  .btn { padding: 9px 20px; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: all 0.2s; border: 1px solid transparent; margin-right: 8px; margin-top: 8px; }
  .btn-submit { background: linear-gradient(135deg, var(--teal), var(--blue)); color: #0F1923; border: none; }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-hint { background: rgba(240,192,64,0.15); border-color: rgba(240,192,64,0.3); color: var(--gold); }
  .btn-hint:hover { background: rgba(240,192,64,0.25); }
  .btn-show { background: rgba(30,100,50,0.2); border-color: rgba(30,150,80,0.4); color: #70E8A0; }
  .btn-show:hover { background: rgba(30,150,80,0.3); }
  .btn-row { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* PAGE NAVIGATION */
  .page-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 36px; padding: 20px 0; border-top: 2px solid var(--border); }
  .page-indicator { font-size: 0.85rem; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }
  .page-indicator span { color: var(--teal); }
  .btn-page { padding: 12px 28px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 700; transition: all 0.2s; border: none; letter-spacing: 0.5px; }
  .btn-page:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-page:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-page-prev { background: rgba(46,116,181,0.2); border: 1px solid rgba(46,116,181,0.4); color: #6AB0E8; }
  .btn-page-next { background: linear-gradient(135deg, var(--teal), var(--blue)); color: #fff; }
  .btn-page-module { background: linear-gradient(135deg, var(--gold), #E8A030); color: #1A1A2E; }
  .page-dots { display: flex; gap: 8px; }
  .page-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
  .page-dot.active { background: var(--teal); box-shadow: 0 0 8px rgba(0,201,167,0.4); }
  .page-dot.visited { background: rgba(0,201,167,0.4); }

  /* KEYBOARD FOCUS — visible outline on every interactive element */
  .module-btn:focus,
  .lesson-btn:focus,
  .btn:focus,
  .btn-run:focus,
  .btn-page:focus,
  .btn-page-prev:focus,
  .btn-page-next:focus,
  .btn-page-module:focus,
  .btn-reset:focus,
  .page-dot:focus,
  .sidebar-home-btn:focus,
  .next-lesson-card:focus,
  a:focus {
    outline: 2px solid var(--teal);
    outline-offset: 2px;
  }

  .footer { text-align: center; color: var(--muted); font-size: 0.78rem; padding: 20px; border-top: 1px solid var(--border); margin-top: 40px; }

  /* SKIP LINK — visually hidden until focused by keyboard */
  .skip-link {
    position: absolute; top: -40px; left: 12px;
    background: var(--teal); color: var(--bg);
    padding: 10px 16px; border-radius: 4px;
    font-weight: 700; text-decoration: none;
    z-index: 200;
    transition: top 0.2s;
  }
  .skip-link:focus {
    top: 12px;
    outline: 2px solid var(--text);
    outline-offset: 2px;
  }

  /* RESPONSIVE / MOBILE — collapsible sidebar */
  .sidebar-toggle {
    display: none;
    background: transparent; border: 1px solid var(--border);
    color: var(--teal); font-size: 1.3rem; padding: 4px 10px;
    border-radius: 4px; cursor: pointer; line-height: 1;
  }
  .sidebar-toggle:hover { background: rgba(0,201,167,0.1); }
  @media (max-width: 900px) {
    .sidebar-toggle { display: inline-block; }
    .sidebar {
      position: fixed; top: 0; left: -300px; width: 280px;
      height: 100vh; z-index: 400; transition: left 0.3s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5); padding-top: 60px;
    }
    .sidebar.open { left: 0; }
    .sidebar-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 399; display: none;
    }
    .sidebar-backdrop.visible { display: block; }
    .main { padding: 20px 16px; max-width: 100%; }
    .header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .header-right { gap: 8px; }
    .header-progress { display: none; }
    .page-nav { flex-direction: column; gap: 16px; align-items: center; }
    .lesson-title { font-size: 1.3rem; }
    .welcome-modal { padding: 24px 20px; }
  }
  @media (max-width: 600px) {
    .main { padding: 14px 10px; }
    .code-block { font-size: 0.78rem; padding: 10px 12px; }
    .editor-highlight, .editor-input { font-size: 0.82rem; padding: 10px 12px; }
    .data-table { font-size: 0.78rem; }
    .data-table th, .data-table td { padding: 5px 8px; }
    .btn-page { padding: 10px 18px; font-size: 0.85rem; }
  }

  /* REDUCED MOTION */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* HEADER PROGRESS READOUT */
  .header-progress {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  /* DIFFICULTY BADGES — sidebar lesson pills */
  .diff-badge {
    display: inline-block;
    margin-left: 8px;
    padding: 1px 7px;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    border-radius: 10px;
    vertical-align: middle;
  }
  .diff-beginner    { background: rgba(112,232,160,0.15); color: var(--green); border: 1px solid rgba(112,232,160,0.4); }
  .diff-intermediate{ background: rgba(240,192,64,0.15);  color: var(--gold);  border: 1px solid rgba(240,192,64,0.4); }
  .diff-advanced    { background: rgba(255,128,128,0.15); color: var(--red);   border: 1px solid rgba(255,128,128,0.4); }
  .diff-expert      { background: rgba(192,159,232,0.15); color: var(--purple);border: 1px solid rgba(192,159,232,0.4); }

  /* WELCOME MODAL */
  .welcome-overlay {
    position: fixed; inset: 0;
    background: rgba(10, 21, 37, 0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 500;
    animation: welcome-fade-in 0.3s ease-out;
  }
  @keyframes welcome-fade-in { from { opacity: 0; } to { opacity: 1; } }
  .welcome-modal {
    background: var(--card);
    border: 1px solid var(--teal);
    border-radius: 8px;
    padding: 36px 40px;
    max-width: 560px;
    width: calc(100% - 48px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,201,167,0.15);
  }
  .welcome-modal h2 {
    color: var(--teal);
    font-size: 1.5rem;
    margin-bottom: 4px;
  }
  .welcome-modal .welcome-sub {
    color: var(--muted);
    font-size: 0.88rem;
    margin-bottom: 20px;
  }
  .welcome-modal ul {
    list-style: none;
    padding: 0;
    margin: 0 0 24px 0;
  }
  .welcome-modal ul li {
    padding: 8px 0 8px 26px;
    position: relative;
    color: var(--text);
    font-size: 0.92rem;
    line-height: 1.5;
  }
  .welcome-modal ul li::before {
    content: '\25B8';
    position: absolute;
    left: 8px;
    color: var(--teal);
    font-size: 0.9rem;
  }
  .welcome-modal code {
    background: var(--sql-bg);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--teal);
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.88em;
  }
  .welcome-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-welcome-primary {
    background: var(--teal);
    color: var(--bg);
    border: none;
    padding: 11px 22px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.88rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-welcome-primary:hover { background: #00E8C2; transform: translateY(-1px); }
  .btn-welcome-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 11px 22px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 0.88rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-welcome-secondary:hover { border-color: var(--teal); color: var(--teal); }
  .welcome-stats {
    margin-top: 18px;
    padding: 12px 14px;
    background: var(--card2);
    border-left: 3px solid var(--teal);
    border-radius: 3px;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.55;
  }
  .welcome-stats strong { color: var(--teal); font-weight: 700; }

  /* SR-ONLY — visually hidden but accessible to screen readers */
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  /* ============================================================
     DASHBOARD STYLES
     ============================================================ */
  .db-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .db-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px; position: relative; overflow: hidden; transition: border-color 0.2s;
  }
  .db-card:hover { border-color: var(--teal); }

<script>
// ============================================================
// SQL SYNTAX HIGHLIGHTING ENGINE (Token-Based)
// ============================================================
const SQL_KEYWORDS = [
  'SELECT','FROM','WHERE','AND','OR','NOT','IN','LIKE','BETWEEN',
  'ORDER','BY','ASC','DESC','LIMIT','GROUP','HAVING','AS','ON',
  'JOIN','INNER','LEFT','RIGHT','OUTER','FULL','CROSS','UNION','ALL',
  'INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE',
  'DROP','ALTER','INDEX','NULL','IS','DISTINCT','CASE','WHEN','THEN',
  'ELSE','END','EXISTS','ANY','SOME','TOP','OFFSET','FETCH','NEXT',
  'ROWS','ONLY','WITH','RECURSIVE','TRUE','FALSE'
];
const SQL_FUNCTIONS = [
  'COUNT','SUM','AVG','MIN','MAX','UPPER','LOWER','LENGTH','TRIM',
  'SUBSTRING','CONCAT','COALESCE','IFNULL','NULLIF','CAST','CONVERT',
  'DATE_SUB','NOW','HOUR','DATE','YEAR','MONTH','DAY','DATEDIFF',
  'ROUND','ABS','MOD','REPLACE'
];

function highlightSQL(text) {
  const tokens = [];
  let remaining = text;
  while (remaining.length > 0) {
    let m = remaining.match(/^(--[^\n]*)/);
    if (m) { tokens.push({type:'cm', text:m[1]}); remaining = remaining.slice(m[1].length); continue; }
    m = remaining.match(/^('(?:[^'\\]|\\.)*')/);
    if (m) { tokens.push({type:'str', text:m[1]}); remaining = remaining.slice(m[1].length); continue; }
    m = remaining.match(/^([A-Za-z_][A-Za-z0-9_]*)/);
    if (m) {
      const word = m[1], upper = word.toUpperCase();
      if (SQL_KEYWORDS.includes(upper)) tokens.push({type:'kw', text:word});
      else if (SQL_FUNCTIONS.includes(upper)) tokens.push({type:'fn', text:word});
      else tokens.push({type:'txt', text:word});
      remaining = remaining.slice(word.length); continue;
    }
    m = remaining.match(/^(\d+(?:\.\d+)?)/);
    if (m) { tokens.push({type:'num', text:m[1]}); remaining = remaining.slice(m[1].length); continue; }
    tokens.push({type:'txt', text:remaining[0]});
    remaining = remaining.slice(1);
  }
  let html = '';
  for (const tok of tokens) {
    const safe = tok.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    switch(tok.type) {
      case 'kw': html += '<span class="hl-kw">' + safe + '</span>'; break;
      case 'fn': html += '<span class="hl-fn">' + safe + '</span>'; break;
      case 'str': html += '<span class="hl-str">' + safe + '</span>'; break;
      case 'num': html += '<span class="hl-num">' + safe + '</span>'; break;
      case 'cm': html += '<span class="hl-cm">' + safe + '</span>'; break;
      default: html += '<span class="hl-txt">' + safe + '</span>'; break;
    }
  }
  return html;
}

function setupEditor(id) {
  const input = document.getElementById('editor-input-' + id);
  const highlight = document.getElementById('editor-highlight-' + id);
  const wrap = input.closest('.editor-wrap');
  if (!input || !highlight) return;

  function sync() {
    highlight.innerHTML = highlightSQL(input.value) + '\n';
    highlight.scrollTop = input.scrollTop;
    highlight.scrollLeft = input.scrollLeft;
  }
  input.addEventListener('input', sync);
  input.addEventListener('scroll', () => { highlight.scrollTop = input.scrollTop; highlight.scrollLeft = input.scrollLeft; });
  input.addEventListener('focus', () => wrap.classList.add('focused'));
  input.addEventListener('blur', () => wrap.classList.remove('focused'));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      // BUG-004: Allow Escape to exit the editor and focus Submit button
      input.blur();
      const submitBtn = document.getElementById('submit-btn-' + id);
      if (submitBtn) submitBtn.focus();
      return;
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = input.selectionStart, end = input.selectionEnd;
      input.value = input.value.substring(0, s) + '  ' + input.value.substring(end);
      input.selectionStart = input.selectionEnd = s + 2;
      sync();
    }
  });
  sync();
}

// ============================================================
// ANSWER CHECKING ENGINE
// ============================================================
const exerciseState = {};

function getExState(id) {
  if (!exerciseState[id]) exerciseState[id] = { attempts: 0, revealed: false, passed: false };
  return exerciseState[id];
}

function submitAnswer(exId) {
  const st = getExState(exId);
  if (st.passed || st.revealed) return;
  const input = document.getElementById('editor-input-' + exId);
  const userAnswer = input.value.trim();
  if (!userAnswer) return;
  const ex = getExerciseById(exId);
  if (!ex) return;

  let allPass = true, firstFailHint = '';
  for (const check of ex.checks) {
    const regex = new RegExp(check.regex, 'i');
    if (!regex.test(userAnswer)) { allPass = false; if (!firstFailHint) firstFailHint = check.hint; }
  }
  st.attempts++;

  const feedbackEl = document.getElementById('feedback-' + exId);
  const hintBtn = document.getElementById('hint-btn-' + exId);
  const submitBtn = document.getElementById('submit-btn-' + exId);

  if (allPass) {
    st.passed = true;
    feedbackEl.className = 'feedback-box feedback-correct show';
    feedbackEl.innerHTML = '<p><strong>Correct!</strong> ' + ex.correctMsg + '</p>';
    submitBtn.disabled = true;
    if (hintBtn) hintBtn.style.display = 'none';
    showAnswerBox(exId);
  } else if (st.attempts === 1) {
    feedbackEl.className = 'feedback-box feedback-wrong show';
    feedbackEl.innerHTML = '<p><strong>Not quite.</strong> Check your query and try again. Click <strong>Hint</strong> if you need a nudge.</p>';
    if (hintBtn) hintBtn.style.display = 'inline-block';
  } else {
    feedbackEl.className = 'feedback-box feedback-wrong show';
    feedbackEl.innerHTML = '<p><strong>Good effort.</strong> Let\'s look at the correct answer together:</p>';
    submitBtn.disabled = true;
    if (hintBtn) hintBtn.style.display = 'none';
    showAnswerBox(exId);
    st.revealed = true;
  }
  if (typeof saveProgress === 'function') saveProgress();
}

function showHint(exId) {
  const ex = getExerciseById(exId);
  const input = document.getElementById('editor-input-' + exId);
  const userAnswer = input.value.trim();
  let hint = ex.generalHint;
  for (const check of ex.checks) {
    const regex = new RegExp(check.regex, 'i');
    if (!regex.test(userAnswer)) { hint = check.hint; break; }
  }
  const feedbackEl = document.getElementById('feedback-' + exId);
  feedbackEl.className = 'feedback-box feedback-hint show';
  feedbackEl.innerHTML = '<p><strong>Hint:</strong> ' + hint + '</p>';
}

function revealAnswer(exId) {
  const st = getExState(exId);
  st.revealed = true;
  const submitBtn = document.getElementById('submit-btn-' + exId);
  const hintBtn = document.getElementById('hint-btn-' + exId);
  if (submitBtn) submitBtn.disabled = true;
  if (hintBtn) hintBtn.style.display = 'none';

function getExerciseById(exId) {
  for (const mod of lessons) {
    for (const lesson of mod) {
      if (!lesson.pages) continue;
      for (const page of lesson.pages) {
        if (!page.exercises) continue;
        for (const ex of page.exercises) {
          if (ex.id === exId) return ex;
        }
      }
    }
  }
  return null;
}

// RENDERING ENGINE — PAGINATED
// ============================================================
let currentModule = 0;
let currentLesson = 0;
let currentPage = 0;
const completed = new Set();
const visitedPages = new Set();

// ============================================================
// PROGRESS PERSISTENCE (localStorage)
// ============================================================
const STORAGE_KEY = 'cic_sql_sandbox_progress_v1';
let saveIndicatorTimer = null;

function saveProgress() {
  try {
    const existingRaw = localStorage.getItem(STORAGE_KEY);
    const existing = existingRaw ? (JSON.parse(existingRaw) || {}) : {};
    const data = {
      v: 1,
      currentModule, currentLesson, currentPage,
      completed: Array.from(completed),
      visitedPages: Array.from(visitedPages),
      exerciseState,
      xp: totalXP,
      achievements: Array.from(unlockedAchievements),
      streak: existing.streak || 0,
      savedAt: Date.now(),
      lastSeenAt: Date.now(),
      welcomeSeen: existing.welcomeSeen === true
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    flashSaveIndicator();
  } catch (e) {
    // localStorage may be unavailable (private mode, quota) — fail silently
    console.warn('Progress save failed:', e);
  }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data || data.v !== 1) return false;

    // Validate position is still within bounds (in case lessons were added/removed)
    if (lessons[data.currentModule] && lessons[data.currentModule][data.currentLesson]
        && lessons[data.currentModule][data.currentLesson].pages[data.currentPage]) {
      currentModule = data.currentModule;
      currentLesson = data.currentLesson;
      currentPage = data.currentPage;
    }
    if (Array.isArray(data.completed)) data.completed.forEach(k => completed.add(k));
    if (Array.isArray(data.visitedPages)) data.visitedPages.forEach(k => visitedPages.add(k));
    if (data.exerciseState && typeof data.exerciseState === 'object') {
      Object.keys(data.exerciseState).forEach(k => { exerciseState[k] = data.exerciseState[k]; });
    }
    // Restore XP, achievements, and streak (Phase 2)
    if (typeof data.xp === 'number') totalXP = data.xp;
    if (Array.isArray(data.achievements)) data.achievements.forEach(id => unlockedAchievements.add(id));
    return true;
  } catch (e) {
    console.warn('Progress load failed:', e);
    return false;
  }
}

function resetProgress() {
  if (!confirm('Reset ALL progress? This will erase your completed lessons, XP, achievements, and query history. You will start over from Module 1, Lesson 1. This cannot be undone.')) return;
  // Clear localStorage
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  // Reset all in-memory state
  Object.keys(exerciseState).forEach(k => delete exerciseState[k]);
  completed.clear();
  visitedPages.clear();
  unlockedAchievements.clear();
  totalXP = 0;
  currentModule = 0; currentLesson = 0; currentPage = 0;
  // Update UI
  updateXPChip();
  document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('done'));
  renderPage(0, 0, 0);
  // Re-show welcome modal after reset
  showWelcome();
}

function flashSaveIndicator() {
  const el = document.getElementById('save-indicator');

  el.classList.add('visible');

function updateHeaderProgress() {
  const el = document.getElementById('header-progress');
  if (!el) return;
  // Count total lessons across all modules from lessonNames
  let total = 0;
  for (let i = 0; i < lessonNames.length; i++) total += lessonNames[i].length;
  const done = completed.size;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  el.textContent = `${done} / ${total} lessons \u2014 ${pct}% complete`;
}

function formatRelativeTime(ts) {
  if (!ts) return 'never';
  const diffMs = Date.now() - ts;
  if (diffMs < 0) return 'just now';
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return diffMin === 1 ? '1 minute ago' : `${diffMin} minutes ago`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr === 1 ? '1 hour ago' : `${diffHr} hours ago`;
  const diffDay = Math.floor(diffHr / 24);
  if (diffDay < 30) return diffDay === 1 ? '1 day ago' : `${diffDay} days ago`;
  const diffMonth = Math.floor(diffDay / 30);
  if (diffMonth < 12) return diffMonth === 1 ? '1 month ago' : `${diffMonth} months ago`;
  const diffYear = Math.floor(diffMonth / 12);
  return diffYear === 1 ? '1 year ago' : `${diffYear} years ago`;
}

function getWelcomeStats() {
  // Count total lessons across all modules
  let total = 0;
  for (let i = 0; i < lessonNames.length; i++) total += lessonNames[i].length;
  const lessonsDone = completed.size;
  // Count exercises marked passed
  let exercisesSolved = 0;
  Object.keys(exerciseState).forEach(k => {
    if (exerciseState[k] && exerciseState[k].passed) exercisesSolved++;
  });
  // Read lastSeenAt from saved data
  let lastSeen = 'never';
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data && data.lastSeenAt) lastSeen = formatRelativeTime(data.lastSeenAt);
    }
  } catch (e) {}
  return { lessonsDone, totalLessons: total, exercisesSolved, lastSeenRelative: lastSeen };
}

function hasExistingProgress() {
  if (completed.size > 0) return true;
  for (const k of Object.keys(exerciseState)) {
    if (exerciseState[k] && (exerciseState[k].passed || exerciseState[k].revealed)) return true;
  }
  return false;
}

function showWelcome() {
  // Don't show if already seen this session
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data && data.welcomeSeen === true) return;
    }
  } catch (e) {}

  const returning = hasExistingProgress();
  const stats = getWelcomeStats();

  const statsCardHtml = returning ? `
    <div class="welcome-stats">
      You're <strong>${stats.lessonsDone}/${stats.totalLessons} lessons complete</strong> &mdash;
      <strong>${stats.exercisesSolved} ${stats.exercisesSolved === 1 ? 'exercise' : 'exercises'} solved</strong> &mdash;
      last played <strong>${stats.lastSeenRelative}</strong>.
    </div>
  ` : '';

  const continueBtn = returning
    ? `<button class="btn-welcome-secondary" onclick="dismissWelcome('resume')">Continue from where I left off</button>`
    : '';

  const overlay = document.createElement('div');
  overlay.className = 'welcome-overlay';
  overlay.id = 'welcome-overlay';
  overlay.setAttribute('role', 'dialog');
  overlay.setAttribute('aria-modal', 'true');
  overlay.setAttribute('aria-labelledby', 'welcome-title');
  overlay.innerHTML = `
    <div class="welcome-modal">
      <h2 id="welcome-title">Welcome to the SQL Security Sandbox <span style="font-size:0.6em;color:#FF8C00;">(FREE DEMO)</span></h2>
      <div class="welcome-sub">Interactive SQL training for cybersecurity analysts</div>
      <ul>
        <li>Learn SQL through a real cybersecurity investigation &mdash; from <code>SELECT</code> to window functions</li>
        <li>Build a working "impossible travel" detector by Module 4</li>
        <li>60+ hands-on exercises across 17 lessons, with hints and instant feedback</li>
      </ul>
      <div class="welcome-buttons">
        <button class="btn-welcome-primary" onclick="dismissWelcome('start')">Start Module 1</button>
        ${continueBtn}
      </div>
      ${statsCardHtml}
    </div>
  `;
  document.body.appendChild(overlay);
  trapFocus(overlay); // BUG-002: focus trap
  // Focus the primary button for keyboard users
  setTimeout(() => {
    const firstBtn = overlay.querySelector('.btn-welcome-primary');

function dismissWelcome(action) {
  const overlay = document.getElementById('welcome-overlay');
  if (overlay) overlay.remove();
  // Mark seen in localStorage
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const data = raw ? (JSON.parse(raw) || {}) : { v: 1 };
    data.welcomeSeen = true;
    data.lastSeenAt = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {}
  if (action === 'start') {
    // Navigate to Module 1 Lesson 1 Page 1
    goPage(0, 0, 0);
  }
  // action === 'resume' just closes the modal — user stays on their last page
}

function renderSection(s) {
  switch(s.type) {
    case 'badge': return `<span class="badge ${s.cls}">${s.label}</span>`;
    case 'html': return `<div class="section-block">${s.content}</div>`;
    case 'code': return `<div class="code-block">${s.content}</div>`;
    case 'scenario': return `<div class="scenario-box">${s.content}</div>`;
    case 'protip': return `<div class="protip-box"><span class="badge badge-protip">Pro Tip</span><br><br>${s.content}</div>`;
    case 'ref': return `<div class="ref-box"><span class="badge badge-ref">Quick Reference</span><br><br>${s.content}</div>`;
    case 'divider': return '<hr class="divider">';
    case 'table':
      let t = '<div class="data-table-wrap"><table class="data-table"><tr>';
      s.headers.forEach(h => t += `<th>${h}</th>`);
      t += '</tr>';
      s.rows.forEach(r => { t += '<tr>'; r.forEach(c => t += `<td>${c}</td>`); t += '</tr>'; });
      t += '</table></div>';
      return t;
    default: return '';
  }
}

function renderPage(mi, li, pi) {
  const L = lessons[mi][li];
  if (!L) return;
  const totalPages = L.pages.length;
  const page = L.pages[pi];
  if (!page) return;

  const totalLessons = lessons[mi].length;
  const lessonPct = Math.round(((li + (pi + 1) / totalPages) / totalLessons) * 100);
  const pageKey = `${mi}-${li}-${pi}`;
  visitedPages.add(pageKey);

  let html = `
    <div class="progress-label">Module ${mi+1} Progress \u2014 Lesson ${li+1} of ${totalLessons}, Page ${pi+1} of ${totalPages}</div>
    <div class="progress-bar" role="progressbar" aria-valuenow="${lessonPct}" aria-valuemin="0" aria-valuemax="100" aria-label="Lesson progress: ${lessonPct}% of module ${mi+1}"><div class="progress-fill" style="width:${lessonPct}%"></div></div>
    <div class="lesson-module">${L.module}</div>
    <h1 class="lesson-title">${L.title}</h1>
    ${L.framework ? `<div class="framework-labels" aria-label="Framework mappings">
      <div class="framework-labels-title">&#9632; Framework Alignment</div>${
        (L.framework.nist || []).map(n => `<span class="fw-chip fw-nist" title="NIST Cybersecurity Framework">&#128737; NIST ${n}</span>`).join('')
      }${
        (L.framework.mitre || []).map(m => `<span class="fw-chip fw-mitre" title="MITRE ATT&amp;CK">&#127919; ${m}</span>`).join('')
      }${
        (L.framework.pci || []).map(p => `<span class="fw-chip fw-pci" title="PCI-DSS v4.0">&#128274; PCI ${p}</span>`).join('')
      }
    </div>` : ''}
    <hr class="divider">
  `;

  // Render sections
  page.sections.forEach(s => html += renderSection(s));

  // Render exercises
  if (page.exercises && page.exercises.length > 0) {
    html += '<span class="badge badge-exercise">Exercises</span>';
    page.exercises.forEach(ex => html += renderExercise(ex));
  } else {
    // Check if a LATER page in this lesson has exercises — show a nudge
    const hasExercisesAhead = L.pages.slice(pi + 1).some(p => p.exercises && p.exercises.length > 0);
    if (hasExercisesAhead) {
      html += `
        <div style="
          margin: 24px 0 8px 0; padding: 14px 18px;
          background: rgba(255,140,0,0.08); border: 1px solid rgba(255,140,0,0.3);
          border-radius: 8px; display: flex; align-items: center; gap: 12px;
        ">
          <span style="font-size:1.4rem;">&#9654;</span>
          <div>
            <div style="font-size:0.85rem;font-weight:700;color:#FFB347;margin-bottom:2px;">Exercises ahead on the next page</div>
            <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);">Use the <strong style="color:#FF8C00;">&#9654; Run Query</strong> button to execute your SQL live against the training database. Hit &ldquo;Next&rdquo; below to continue.</div>
          </div>
        </div>
      `;
    }
  }

  // Page navigation
  html += buildPageNav(mi, li, pi, totalPages);

  html += '<div class="footer">&copy; ' + new Date().getFullYear() + ' Cosmic Innovators Collective | Building Digital Guardians</div>';

  document.getElementById('main-content').innerHTML = html;
  window.scrollTo(0, 0);

  // BUG-003: Move focus to lesson title for screen reader announcement
  setTimeout(() => {
    const title = document.querySelector('.lesson-title');
    if (title) { title.setAttribute('tabindex', '-1'); title.focus(); }
  }, 100);

  // Initialize editors and restore prior exercise state (if any)
  if (page.exercises) {
    page.exercises.forEach(ex => {
      // Preserve persisted state — only initialize if not seen before
      if (!exerciseState[ex.id]) {
        exerciseState[ex.id] = { attempts: 0, revealed: false, passed: false };
      }
      setTimeout(() => {
        setupEditor(ex.id);
        restoreExerciseUI(ex.id);
      }, 50);
    });
  }

  // Mark lesson complete if on last page
  if (pi === totalPages - 1) {
    completed.add(`${mi}-${li}`);
  }

  updateSidebar(mi, li);
  updateSidebarDone();
  updateHeaderProgress();
  saveProgress();
}

// Restore exercise UI from saved state (passed/revealed → show answer, disable submit)
function restoreExerciseUI(exId) {
  const st = exerciseState[exId];
  if (!st) return;
  if (st.passed || st.revealed) {
    const submitBtn = document.getElementById('submit-btn-' + exId);
    const hintBtn = document.getElementById('hint-btn-' + exId);
    if (submitBtn) submitBtn.disabled = true;
    if (hintBtn) hintBtn.style.display = 'none';
    showAnswerBox(exId);
    const feedbackEl = document.getElementById('feedback-' + exId);
    if (feedbackEl && st.passed) {
      const ex = getExerciseById(exId);
      feedbackEl.className = 'feedback-box feedback-correct show';
      feedbackEl.innerHTML = '<p><strong>Previously solved.</strong> ' + (ex ? ex.correctMsg : '') + '</p>';
    } else if (feedbackEl && st.revealed) {
      feedbackEl.className = 'feedback-box show';
      feedbackEl.innerHTML = '<p><em>Answer previously revealed.</em></p>';
    }
  }
}

function buildPageNav(mi, li, pi, totalPages) {
  let html = '<div class="page-nav">';

  // Previous button
  if (pi > 0) {
    html += `<button class="btn-page btn-page-prev" onclick="goPage(${mi},${li},${pi-1})" aria-label="Go to previous page">\u2190 Previous Page</button>`;
  } else if (li > 0) {
    // Go to last page of previous lesson
    const prevPages = lessons[mi][li-1].pages.length;
    html += `<button class="btn-page btn-page-prev" onclick="goPage(${mi},${li-1},${prevPages-1})" aria-label="Go to previous lesson">\u2190 Previous Lesson</button>`;
  } else {
    html += '<div></div>'; // spacer
  }

  // Page dots
  html += '<div style="text-align:center;">';
  html += `<div class="page-indicator">Page <span>${pi+1}</span> of <span>${totalPages}</span></div>`;
  html += '<div class="page-dots" style="justify-content:center; margin-top:8px;">';
  for (let i = 0; i < totalPages; i++) {
    const key = `${mi}-${li}-${i}`;
    let cls = 'page-dot';
    if (i === pi) cls += ' active';
    else if (visitedPages.has(key)) cls += ' visited';
    html += `<div class="${cls}" role="button" tabindex="0" aria-label="Go to page ${i+1} of ${totalPages}" onclick="goPage(${mi},${li},${i})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();goPage(${mi},${li},${i});}" style="cursor:pointer;"></div>`;
  }
  html += '</div></div>';

  // Next button
  if (pi < totalPages - 1) {
    html += `<button class="btn-page btn-page-next" onclick="goPage(${mi},${li},${pi+1})" aria-label="Go to next page">Next Page \u2192</button>`;
  } else if (li < lessons[mi].length - 1) {
    html += `<button class="btn-page btn-page-next" onclick="goPage(${mi},${li+1},0)" aria-label="Go to next lesson">Next Lesson \u2192</button>`;
  } else if (mi < lessons.length - 1 && lessons[mi+1].length > 0) {
    html += `<button class="btn-page btn-page-module" onclick="goPage(${mi+1},0,0)" aria-label="Go to next module">Next Module \u2192</button>`;
  } else {
    html += '<div style="text-align:right;color:var(--teal);font-weight:700;">&#10022; Module Complete!</div>';
  }

  html += '</div>';
  return html;
}

function goPage(mi, li, pi) {
  if (!lessons[mi] || !lessons[mi][li] || !lessons[mi][li].pages[pi]) return;
  currentModule = mi;
  currentLesson = li;
  currentPage = pi;
  renderPage(mi, li, pi);
}

function switchModule(mi) {
  if (lessons[mi] && lessons[mi].length > 0) goPage(mi, 0, 0);
}

function updateSidebar(mi, li) {

function updateSidebarDone() {
  completed.forEach(key => {
    const btn = document.getElementById('sb-' + key);
    if (btn && !btn.classList.contains('active')) btn.classList.add('done');
  });
}

function getStreak() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return 0;
    const data = JSON.parse(raw);
    return data.streak || 0;
  } catch(e) { return 0; }
}

function awardXP(amount, reason) {
  totalXP += amount;
  updateXPChip();
  showToast('⚡', `+${amount} XP`, reason || 'XP earned', false);
  saveProgress();
}

function updateXPChip() {
  const el = document.getElementById('xp-chip');
  if (el) el.textContent = totalXP + ' XP';
}

function checkAchievements() {
  const newlyUnlocked = [];
  ACHIEVEMENTS.forEach(ach => {
    if (!unlockedAchievements.has(ach.id) && ach.check()) {
      unlockedAchievements.add(ach.id);
      totalXP += ach.xp;
      newlyUnlocked.push(ach);
    }
  });
  if (newlyUnlocked.length > 0) {
    updateXPChip();
    saveProgress();
    newlyUnlocked.forEach((ach, i) => {
      setTimeout(() => showToast(ach.icon, ach.name + ' Unlocked!', ach.desc, true), i * 800);
    });
  }
}

let _toastTimer = null;
function showToast(icon, title, subtitle, isGold) {
  const existing = document.getElementById('sandbox-toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'sandbox-toast';
  el.className = 'toast' + (isGold ? ' toast-gold' : '');
  el.setAttribute('role', 'status');
  el.setAttribute('aria-live', 'polite');
  el.setAttribute('aria-atomic', 'true');
  el.innerHTML = `<div class="toast-icon" aria-hidden="true">${icon}</div><div class="toast-text"><strong>${title}</strong><span>${subtitle}</span></div>`;
  document.body.appendChild(el);
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { if (el.parentNode) el.remove(); }, 3500);
}

function renderDashboard() {
  updateMasteredSet();
  const totalLessons = lessonNames.reduce((a, m) => a + m.length, 0);
  const visitedCount = completed.size;
  const masteredCount = mastered.size;
  const overallPct = totalLessons > 0 ? Math.round((masteredCount / totalLessons) * 100) : 0;

  // Count exercises
  let totalEx = 0, passedEx = 0, revealedEx = 0;
  for (const mod of lessons) {
    for (const lesson of mod) {
      for (const page of lesson.pages) {
        if (page.exercises) {
          page.exercises.forEach(ex => {
            totalEx++;
            const s = exerciseState[ex.id];
            if (s && s.passed) passedEx++;
            if (s && s.revealed && !s.passed) revealedEx++;
          });
        }
      }
    }
  }

  // XP level calculation
  const XP_PER_LEVEL = 200;
  const level = Math.floor(totalXP / XP_PER_LEVEL) + 1;
  const xpInLevel = totalXP % XP_PER_LEVEL;
  const xpPct = Math.round((xpInLevel / XP_PER_LEVEL) * 100);
  const streak = getStreak();

  // Find next unstarted lesson
  let nextMi = -1, nextLi = -1;
  outer: for (let mi = 0; mi < lessons.length; mi++) {
    for (let li = 0; li < lessons[mi].length; li++) {
      if (!completed.has(`${mi}-${li}`)) { nextMi = mi; nextLi = li; break outer; }
    }
  }

  // Module skill map
  const moduleSkills = moduleNames.map((name, mi) => {
    const mLessons = lessonNames[mi].length;
    let mMastered = 0;
    for (let li = 0; li < mLessons; li++) {
      if (mastered.has(`${mi}-${li}`)) mMastered++;
    }
    const pct = Math.round((mMastered / mLessons) * 100);
    const colors = ['#00C9A7','#2E74B5','#F0C040','#C09FE8'];
    return { name, pct, color: colors[mi], mMastered, mLessons };

  // Recent activity from exerciseState
  const recentActivity = [];
  Object.entries(exerciseState).forEach(([id, s]) => {
    if (s.passed) recentActivity.push({ icon: '✅', text: `Passed exercise <strong>${id}</strong>`, type: 'pass' });

const _origSubmitAnswer = submitAnswer;
submitAnswer = function(exId) {
  const stBefore = exerciseState[exId] ? { ...exerciseState[exId] } : null;
  _origSubmitAnswer(exId);
  const stAfter = exerciseState[exId];
  if (stAfter && stAfter.passed && (!stBefore || !stBefore.passed)) {
    awardXP(25, 'Exercise passed!');
    checkAchievements();
  }
};

  const sidebar = document.getElementById('sidebar');

  sidebar.classList.remove('open');
  backdrop.classList.remove('visible');
  if (toggle) toggle.setAttribute('aria-expanded', 'false');
}

// ============================================================
// MASTERED LESSONS TRACKING (exercises passed vs pages visited)
// ============================================================
const mastered = new Set();

function updateMasteredSet() {
  // A lesson is "mastered" only if ALL its exercises are passed
  for (let mi = 0; mi < lessons.length; mi++) {
    for (let li = 0; li < lessons[mi].length; li++) {
      const L = lessons[mi][li];
      let allExercises = [];
      L.pages.forEach(p => { if (p.exercises) allExercises.push(...p.exercises); });
      if (allExercises.length === 0) {
        // Lesson with no exercises: mastered if completed (visited last page)
        if (completed.has(`${mi}-${li}`)) mastered.add(`${mi}-${li}`);
      } else {
        const allPassed = allExercises.every(ex => exerciseState[ex.id] && exerciseState[ex.id].passed);
        if (allPassed) mastered.add(`${mi}-${li}`);
        else mastered.delete(`${mi}-${li}`);
      }
    }
  }
}

// Patch updateHeaderProgress to show both metrics
const _origUpdateHeader = updateHeaderProgress;
updateHeaderProgress = function() {
  updateMasteredSet();
  const el = document.getElementById('header-progress');
  if (!el) return;
  let total = 0;
  for (let i = 0; i < lessonNames.length; i++) total += lessonNames[i].length;
  const visited = completed.size;
  const masteredCount = mastered.size;
  const pct = total > 0 ? Math.round((masteredCount / total) * 100) : 0;
  el.textContent = `${masteredCount} / ${total} mastered \u2014 ${pct}%`;
  el.title = `${visited} lessons visited, ${masteredCount} fully mastered (all exercises passed)`;
};

  const data = {
    program: 'SQL Security Sandbox',
    author: 'Cosmic Innovators Collective',
    exportedAt: new Date().toISOString(),
    lessonsVisited: Array.from(completed),
    lessonsMastered: Array.from(mastered),
    exerciseState: exerciseState,
    stats: {
      totalLessons: lessonNames.reduce((a, m) => a + m.length, 0),
      lessonsVisited: completed.size,
      lessonsMastered: mastered.size,
      exercisesPassed: Object.values(exerciseState).filter(s => s.passed).length,
      exercisesRevealed: Object.values(exerciseState).filter(s => s.revealed && !s.passed).length
    }
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'sql-security-sandbox-progress.json';
  a.click();
  URL.revokeObjectURL(url);
}

/**
 * Lazy-load sql.js WASM from CDN, seed the DB, then call cb(db).
 * Safe to call multiple times — only loads once.
 */
function loadSqlEngine(cb) {
  if (sqlJsReady && sqlJsDb) { cb(sqlJsDb); return; }
  if (sqlJsLoading) {
    // Queue the callback to fire when loading completes
    const poller = setInterval(() => {
      if (sqlJsReady && sqlJsDb) { clearInterval(poller); cb(sqlJsDb); }
    }, 100);
    return;
  }
  sqlJsLoading = true;
  // Load sql.js from CDN
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/sql-wasm.min.js';
  // integrity attr removed — SRI checks can conflict with CSP when loading dynamically
  script.crossOrigin = 'anonymous';
  script.referrerPolicy = 'no-referrer';
  script.onload = function() {
    if (typeof initSqlJsLib === 'undefined' && typeof window.initSqlJs !== 'undefined') {
      // The library exports as window.initSqlJs
    }
    const initFn = window.initSqlJs;
    if (!initFn) {
      console.error('sql.js failed to load');
      sqlJsLoading = false;
      return;
    }
    initFn({ locateFile: f => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/' + f })
      .then(function(SQL) {
        const db = new SQL.Database();
        db.run(SQL_SEED);
        sqlJsDb = db;
        sqlJsReady = true;
        sqlJsLoading = false;
        cb(db);
      })
      .catch(function(err) {
        console.error('sql.js init error:', err);
        sqlJsLoading = false;
      });
  };
  script.onerror = function() {
    sqlJsLoading = false;
    console.error('sql.js CDN script failed to load');
  };
  document.head.appendChild(script);
}

/**
 * Run user SQL against the live SQLite DB and render results
 * into the result panel for the given exercise ID.
 */
function runQuery(exId) {
  const input = document.getElementById('editor-input-' + exId);
  const resultWrap = document.getElementById('sql-result-' + exId);
  const resultBody = document.getElementById('sql-result-body-' + exId);
  const runBtn = document.getElementById('run-btn-' + exId);
  if (!input || !resultWrap || !resultBody) return;

  const sql = input.value.trim();
  if (!sql) return;

  // Show the panel with loading state
  resultWrap.classList.add('show');
  resultBody.innerHTML = '<div class="sql-loading">&#9654; Running query…</div>';
  if (runBtn) runBtn.disabled = true;

  loadSqlEngine(function(db) {
    if (runBtn) runBtn.disabled = false;
    try {
      const results = db.exec(sql);
      if (!results || results.length === 0) {
        resultBody.innerHTML = '<div class="sql-result-empty">Query ran successfully — 0 rows returned.</div>';
        return;
      }
      // Render result table (show up to 50 rows to keep UI fast)
      const { columns, values } = results[0];
      const rowCount = values.length;
      const displayRows = values.slice(0, 50);
      let tableHtml = `
        <div class="sql-result-header">
          <span>&#10003; ${rowCount} row${rowCount !== 1 ? 's' : ''} returned</span>
          ${rowCount > 50 ? '<span style="color:var(--gold)">Showing first 50</span>' : ''}
        </div>
        <div style="overflow-x:auto;">
          <table class="sql-result-table">
            <thead><tr>${columns.map(c => `<th>${escHtml(String(c))}</th>`).join('')}</tr></thead>
            <tbody>
      `;
      displayRows.forEach(row => {
        tableHtml += '<tr>' + row.map(v =>
          `<td>${v === null ? '<span style="color:rgba(255,255,255,0.3)">NULL</span>' : escHtml(String(v))}</td>`
        ).join('') + '</tr>';
      });
      tableHtml += '</tbody></table></div>';
      resultBody.innerHTML = tableHtml;

      // Award XP for first time running a query in this exercise
      const runKey = 'ran_' + exId;
      if (!unlockedAchievements.has(runKey)) {
        unlockedAchievements.add(runKey);
        awardXP(5, 'Query executed');
        checkAchievements();
      }
    } catch (err) {
      // Strip WASM noise from error messages
      const msg = String(err.message || err).replace(/^RuntimeError: .*(\n|$)/,'').trim();
      resultBody.innerHTML = `<div class="sql-result-error">&#9888; ${escHtml(msg)}</div>`;
    }
  });
}

/** Escape HTML for safe rendering in result tables */
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// BUG-002: Focus trap utility for modal dialogs
function trapFocus(container) {
  const focusable = container.querySelectorAll(
    'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
  );
  if (!focusable.length) return;
  const first = focusable[0];
  const last = focusable[focusable.length - 1];
  container.addEventListener('keydown', (e) => {
    if (e.key !== 'Tab') return;
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  });
}

// BUG-001: Global Escape key handler for modals and sidebar
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {

    if (sidebar && sidebar.classList.contains('open')) {
      closeSidebar();
      const toggle = document.getElementById('sidebar-toggle');
      if (toggle) toggle.focus();
    }
  }
});
