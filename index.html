<!DOCTYPE html>
<html lang="en">
<!--
  SQL Security Sandbox — Interactive Cybersecurity SQL Training
  Author:  Christopher Smith <https://github.com/cjsmith605>
  License: MIT
  Part of: Cosmic Innovators Collective — Training
  Purpose: Teach SQL fundamentals through a narrative-driven cybersecurity
           course — from SELECT to window functions and impossible-travel
           detection.
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Security Sandbox — Interactive Cybersecurity SQL Training | Cosmic Innovators Collective</title>
<meta name="description" content="Interactive SQL training sandbox teaching cybersecurity analysts SQL through a narrative-driven course — from SELECT to window functions and impossible-travel detection.">
<meta name="author" content="Christopher Smith">
<link rel="author" href="https://github.com/cjsmith605">
<meta property="og:title" content="SQL Security Sandbox — Interactive Cybersecurity SQL Training">
<meta property="og:description" content="From your first SELECT to building a working impossible-travel detector. Interactive SQL training for cybersecurity analysts.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="theme-color" content="#0F1923">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; font-src 'self';">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0F1923; --card: #1A2535; --card2: #1E2D42;
    --teal: #00C9A7; --blue: #2E74B5; --gold: #F0C040;
    --text: #E8EDF2; --muted: #8A9BB0; --border: #2A3A52;
    --sql-bg: #1A1A2E; --correct: #1A3A2A; --warn: #3A2A1A;
    --red: #FF8080; --green: #70E8A0; --purple: #C09FE8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Calibri, sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #0A1525 0%, #1A2535 100%); border-bottom: 2px solid var(--teal); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 1.2rem; font-weight: 700; color: var(--teal); letter-spacing: 1px; }
  .logo span { color: var(--gold); }
  .subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .save-indicator { font-size: 0.72rem; color: var(--muted); opacity: 0; transition: opacity 0.3s; letter-spacing: 0.3px; }
  .save-indicator.visible { opacity: 1; color: var(--teal); }
  .save-indicator::before { content: '\25CF '; font-size: 0.6rem; }
  .btn-reset { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 6px 14px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.2s; }
  .btn-reset:hover { color: var(--red); border-color: var(--red); background: rgba(255,128,128,0.05); }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 70px); }
  .sidebar { width: 270px; background: var(--card); border-right: 1px solid var(--border); padding: 20px 0; flex-shrink: 0; overflow-y: auto; }
  .main { flex: 1; padding: 32px; max-width: 900px; overflow-y: auto; }

  /* SIDEBAR */
  .module-btn { display: block; width: 100%; padding: 10px 20px; background: none; border: none; color: var(--muted); text-align: left; cursor: pointer; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.2s; }
  .module-btn:hover { color: var(--teal); background: rgba(0,201,167,0.05); }
  .module-btn.active { color: var(--teal); border-left: 3px solid var(--teal); background: rgba(0,201,167,0.08); }
  .lesson-btn { display: block; width: 100%; padding: 8px 20px 8px 32px; background: none; border: none; color: var(--muted); text-align: left; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
  .lesson-btn:hover { color: var(--text); }
  .lesson-btn.active { color: var(--teal); font-weight: 600; }
  .lesson-btn.done::before { content: '\2713 '; color: var(--teal); }

  /* PROGRESS */
  .progress-bar { background: var(--border); border-radius: 4px; height: 6px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--blue)); border-radius: 4px; transition: width 0.5s ease; }
  .progress-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }

  /* BADGES */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  .badge-intro { background: rgba(46,116,181,0.2); color: #6AB0E8; border: 1px solid rgba(46,116,181,0.3); }
  .badge-dive { background: rgba(0,201,167,0.15); color: var(--teal); border: 1px solid rgba(0,201,167,0.25); }
  .badge-scenario { background: rgba(240,192,64,0.15); color: var(--gold); border: 1px solid rgba(240,192,64,0.25); }
  .badge-demo { background: rgba(150,80,220,0.15); color: #C09FE8; border: 1px solid rgba(150,80,220,0.25); }
  .badge-exercise { background: rgba(255,120,80,0.15); color: #FF9070; border: 1px solid rgba(255,120,80,0.25); }
  .badge-answer { background: rgba(30,100,50,0.3); color: #70E8A0; border: 1px solid rgba(30,150,80,0.4); }
  .badge-protip { background: rgba(150,80,220,0.2); color: #C09FE8; border: 1px solid rgba(150,80,220,0.3); }
  .badge-ref { background: rgba(46,116,181,0.15); color: #6AB0E8; border: 1px solid rgba(46,116,181,0.25); }

  /* CONTENT */
  .lesson-title { font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .lesson-module { font-size: 0.82rem; color: var(--teal); margin-bottom: 24px; font-weight: 600; }
  .section-block { margin-bottom: 28px; }
  .section-block h3 { font-size: 1.05rem; margin-bottom: 10px; color: var(--text); }
  .section-block p { color: var(--muted); line-height: 1.75; font-size: 0.95rem; margin-bottom: 8px; }
  .section-block ul, .section-block ol { padding-left: 20px; color: var(--muted); line-height: 1.9; font-size: 0.95rem; }
  .section-block li { margin-bottom: 4px; }
  strong { color: var(--text); }
  code { background: rgba(0,201,167,0.1); color: var(--teal); padding: 1px 6px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.9em; }

  /* BOXES */
  .scenario-box { background: rgba(240,192,64,0.06); border: 1px solid rgba(240,192,64,0.2); border-left: 4px solid var(--gold); border-radius: 8px; padding: 16px 20px; margin-top: 10px; }
  .scenario-box p { color: #D4BE80; margin-bottom: 6px; font-size: 0.93rem; }
  .protip-box { background: rgba(150,80,220,0.06); border: 1px solid rgba(150,80,220,0.2); border-left: 4px solid var(--purple); border-radius: 8px; padding: 16px 20px; margin-top: 10px; }
  .protip-box p { color: #C8B0E8; margin-bottom: 6px; font-size: 0.93rem; }
  .ref-box { background: rgba(46,116,181,0.06); border: 1px solid rgba(46,116,181,0.2); border-left: 4px solid var(--blue); border-radius: 8px; padding: 12px 16px; margin: 10px 0; }
  .ref-box p { color: #90B8D8; font-size: 0.88rem; margin-bottom: 4px; }

  /* CODE BLOCKS */
  .code-block { background: var(--sql-bg); border: 1px solid #2A2A4A; border-radius: 8px; padding: 16px 20px; font-family: 'Courier New', monospace; font-size: 0.88rem; overflow-x: auto; margin: 10px 0; color: #A8D8F0; line-height: 1.6; white-space: pre-wrap; }
  .kw { color: #FF79C6; font-weight: bold; }
  .str { color: #F1FA8C; }
  .num { color: #BD93F9; }
  .cm { color: #6272A4; }
  .fn { color: #50FA7B; }

  /* DATA TABLES */
  .data-table-wrap { overflow-x: auto; margin: 12px 0; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .data-table th { background: #1F3864; color: #A8D8F0; padding: 8px 12px; text-align: left; font-weight: 600; border: 1px solid var(--border); }
  .data-table td { padding: 7px 12px; border: 1px solid var(--border); color: var(--muted); }
  .data-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .data-table tr:hover td { background: rgba(0,201,167,0.04); }
  .val-s { color: #70E8A0; font-weight: 600; }
  .val-f { color: #FF8080; font-weight: 600; }
  .val-w { color: var(--gold); font-weight: 600; }

  /* SYNTAX-HIGHLIGHTED EDITOR */
  .editor-wrap { position: relative; margin: 10px 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); transition: border 0.2s; }
  .editor-wrap.focused { border-color: var(--teal); }
  .editor-highlight, .editor-input {
    font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.6;
    padding: 14px 16px; margin: 0; border: none; white-space: pre-wrap;
    word-wrap: break-word; overflow: auto; min-height: 100px;
  }
  .editor-highlight {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: #0A1018; color: transparent; pointer-events: none; z-index: 1;
  }
  .editor-input {
    position: relative; z-index: 2; width: 100%; background: transparent;
    color: #FFFFFF; caret-color: var(--teal); resize: vertical;
    outline: none; -webkit-text-fill-color: transparent;
  }
  .editor-highlight .hl-kw { color: #FF79C6; font-weight: bold; }
  .editor-highlight .hl-fn { color: #50FA7B; }
  .editor-highlight .hl-str { color: #F1FA8C; }
  .editor-highlight .hl-num { color: #BD93F9; }
  .editor-highlight .hl-txt { color: #FFFFFF; }
  .editor-highlight .hl-cm { color: #6272A4; font-style: italic; }

  /* EXERCISE BOX */
  .exercise-box { background: rgba(255,120,80,0.05); border: 1px solid rgba(255,120,80,0.2); border-radius: 10px; padding: 20px; margin-top: 10px; }
  .exercise-box p { color: #D4A090; margin-bottom: 12px; font-size: 0.95rem; line-height: 1.7; }
  .data-context { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; margin-bottom: 14px; }
  .data-context p { color: var(--muted); font-size: 0.85rem; margin-bottom: 4px; }
  .data-context strong { color: var(--teal); }
  .ex-label { color: var(--gold); font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; }

  /* FEEDBACK */
  .feedback-box { border-radius: 8px; padding: 14px 18px; margin-top: 10px; display: none; }
  .feedback-box.show { display: block; }
  .feedback-correct { background: rgba(30,100,50,0.15); border: 1px solid rgba(30,150,80,0.3); }
  .feedback-correct p { color: #90D8B0; }
  .feedback-wrong { background: rgba(150,40,40,0.15); border: 1px solid rgba(150,60,60,0.3); }
  .feedback-wrong p { color: #E8A0A0; }
  .feedback-hint { background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.2); }
  .feedback-hint p { color: #D4BE80; }

  /* ANSWER REVEAL */
  .answer-box { background: rgba(30,100,50,0.1); border: 1px solid rgba(30,150,80,0.3); border-radius: 10px; padding: 20px; margin-top: 10px; display: none; }
  .answer-box.visible { display: block; }
  .answer-box p { color: #90D8B0; line-height: 1.7; font-size: 0.93rem; margin-bottom: 6px; }

  /* BUTTONS */
  .btn { padding: 9px 20px; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: all 0.2s; border: 1px solid transparent; margin-right: 8px; margin-top: 8px; }
  .btn-submit { background: linear-gradient(135deg, var(--teal), var(--blue)); color: #fff; border: none; }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-hint { background: rgba(240,192,64,0.15); border-color: rgba(240,192,64,0.3); color: var(--gold); }
  .btn-hint:hover { background: rgba(240,192,64,0.25); }
  .btn-show { background: rgba(30,100,50,0.2); border-color: rgba(30,150,80,0.4); color: #70E8A0; }
  .btn-show:hover { background: rgba(30,150,80,0.3); }
  .btn-row { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* PAGE NAVIGATION */
  .page-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 36px; padding: 20px 0; border-top: 2px solid var(--border); }
  .page-indicator { font-size: 0.85rem; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }
  .page-indicator span { color: var(--teal); }
  .btn-page { padding: 12px 28px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 700; transition: all 0.2s; border: none; letter-spacing: 0.5px; }
  .btn-page:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-page:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-page-prev { background: rgba(46,116,181,0.2); border: 1px solid rgba(46,116,181,0.4); color: #6AB0E8; }
  .btn-page-next { background: linear-gradient(135deg, var(--teal), var(--blue)); color: #fff; }
  .btn-page-module { background: linear-gradient(135deg, var(--gold), #E8A030); color: #1A1A2E; }
  .page-dots { display: flex; gap: 8px; }
  .page-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
  .page-dot.active { background: var(--teal); box-shadow: 0 0 8px rgba(0,201,167,0.4); }
  .page-dot.visited { background: rgba(0,201,167,0.4); }

  /* KEYBOARD FOCUS — visible outline on every interactive element */
  .module-btn:focus,
  .lesson-btn:focus,
  .btn:focus,
  .btn-page:focus,
  .btn-page-prev:focus,
  .btn-page-next:focus,
  .btn-page-module:focus,
  .btn-reset:focus,
  .page-dot:focus,
  a:focus {
    outline: 2px solid var(--teal);
    outline-offset: 2px;
  }

  .footer { text-align: center; color: var(--border); font-size: 0.78rem; padding: 20px; border-top: 1px solid var(--border); margin-top: 40px; }

  /* SKIP LINK — visually hidden until focused by keyboard */
  .skip-link {
    position: absolute; top: -40px; left: 12px;
    background: var(--teal); color: var(--bg);
    padding: 10px 16px; border-radius: 4px;
    font-weight: 700; text-decoration: none;
    z-index: 200;
    transition: top 0.2s;
  }
  .skip-link:focus {
    top: 12px;
    outline: 2px solid var(--text);
    outline-offset: 2px;
  }

  /* RESPONSIVE / MOBILE — collapsible sidebar */
  .sidebar-toggle {
    display: none;
    background: transparent; border: 1px solid var(--border);
    color: var(--teal); font-size: 1.3rem; padding: 4px 10px;
    border-radius: 4px; cursor: pointer; line-height: 1;
  }
  .sidebar-toggle:hover { background: rgba(0,201,167,0.1); }
  @media (max-width: 900px) {
    .sidebar-toggle { display: inline-block; }
    .sidebar {
      position: fixed; top: 0; left: -300px; width: 280px;
      height: 100vh; z-index: 400; transition: left 0.3s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5); padding-top: 60px;
    }
    .sidebar.open { left: 0; }
    .sidebar-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 399; display: none;
    }
    .sidebar-backdrop.visible { display: block; }
    .main { padding: 20px 16px; max-width: 100%; }
    .header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .header-right { gap: 8px; }
    .header-progress { display: none; }
    .page-nav { flex-direction: column; gap: 16px; align-items: center; }
    .lesson-title { font-size: 1.3rem; }
    .welcome-modal { padding: 24px 20px; }
  }
  @media (max-width: 600px) {
    .main { padding: 14px 10px; }
    .code-block { font-size: 0.78rem; padding: 10px 12px; }
    .editor-highlight, .editor-input { font-size: 0.82rem; padding: 10px 12px; }
    .data-table { font-size: 0.78rem; }
    .data-table th, .data-table td { padding: 5px 8px; }
    .btn-page { padding: 10px 18px; font-size: 0.85rem; }
  }

  /* REDUCED MOTION */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* HEADER PROGRESS READOUT */
  .header-progress {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  /* DIFFICULTY BADGES — sidebar lesson pills */
  .diff-badge {
    display: inline-block;
    margin-left: 8px;
    padding: 1px 7px;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    border-radius: 10px;
    vertical-align: middle;
  }
  .diff-beginner    { background: rgba(112,232,160,0.15); color: var(--green); border: 1px solid rgba(112,232,160,0.4); }
  .diff-intermediate{ background: rgba(240,192,64,0.15);  color: var(--gold);  border: 1px solid rgba(240,192,64,0.4); }
  .diff-advanced    { background: rgba(255,128,128,0.15); color: var(--red);   border: 1px solid rgba(255,128,128,0.4); }
  .diff-expert      { background: rgba(192,159,232,0.15); color: var(--purple);border: 1px solid rgba(192,159,232,0.4); }

  /* WELCOME MODAL */
  .welcome-overlay {
    position: fixed; inset: 0;
    background: rgba(10, 21, 37, 0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 500;
    animation: welcome-fade-in 0.3s ease-out;
  }
  @keyframes welcome-fade-in { from { opacity: 0; } to { opacity: 1; } }
  .welcome-modal {
    background: var(--card);
    border: 1px solid var(--teal);
    border-radius: 8px;
    padding: 36px 40px;
    max-width: 560px;
    width: calc(100% - 48px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,201,167,0.15);
  }
  .welcome-modal h2 {
    color: var(--teal);
    font-size: 1.5rem;
    margin-bottom: 4px;
  }
  .welcome-modal .welcome-sub {
    color: var(--muted);
    font-size: 0.88rem;
    margin-bottom: 20px;
  }
  .welcome-modal ul {
    list-style: none;
    padding: 0;
    margin: 0 0 24px 0;
  }
  .welcome-modal ul li {
    padding: 8px 0 8px 26px;
    position: relative;
    color: var(--text);
    font-size: 0.92rem;
    line-height: 1.5;
  }
  .welcome-modal ul li::before {
    content: '\25B8';
    position: absolute;
    left: 8px;
    color: var(--teal);
    font-size: 0.9rem;
  }
  .welcome-modal code {
    background: var(--sql-bg);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--teal);
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.88em;
  }
  .welcome-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-welcome-primary {
    background: var(--teal);
    color: var(--bg);
    border: none;
    padding: 11px 22px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.88rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-welcome-primary:hover { background: #00E8C2; transform: translateY(-1px); }
  .btn-welcome-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 11px 22px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 0.88rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-welcome-secondary:hover { border-color: var(--teal); color: var(--teal); }
  .welcome-stats {
    margin-top: 18px;
    padding: 12px 14px;
    background: var(--card2);
    border-left: 3px solid var(--teal);
    border-radius: 3px;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.55;
  }
  .welcome-stats strong { color: var(--teal); font-weight: 700; }

  /* SR-ONLY — visually hidden but accessible to screen readers */
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  /* FOCUS-VISIBLE UPGRADE — replaces Tier 1 :focus rules for mouse suppression */
  .module-btn:focus-visible,
  .lesson-btn:focus-visible,
  .btn:focus-visible,
  .btn-page:focus-visible,
  .btn-page-prev:focus-visible,
  .btn-page-next:focus-visible,
  .btn-page-module:focus-visible,
  .btn-reset:focus-visible,
  .page-dot:focus-visible,
  .btn-welcome-primary:focus-visible,
  .btn-welcome-secondary:focus-visible,
  a:focus-visible {
    outline: 2px solid var(--teal);
    outline-offset: 2px;
  }
  /* Suppress plain :focus outline for mouse clicks */
  .module-btn:focus:not(:focus-visible),
  .lesson-btn:focus:not(:focus-visible),
  .btn:focus:not(:focus-visible),
  .btn-page:focus:not(:focus-visible),
  .btn-reset:focus:not(:focus-visible),
  .page-dot:focus:not(:focus-visible) {
    outline: none;
  }
</style>

<script>
// ============================================================
// SQL SYNTAX HIGHLIGHTING ENGINE (Token-Based)
// ============================================================
const SQL_KEYWORDS = [
  'SELECT','FROM','WHERE','AND','OR','NOT','IN','LIKE','BETWEEN',
  'ORDER','BY','ASC','DESC','LIMIT','GROUP','HAVING','AS','ON',
  'JOIN','INNER','LEFT','RIGHT','OUTER','FULL','CROSS','UNION','ALL',
  'INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE',
  'DROP','ALTER','INDEX','NULL','IS','DISTINCT','CASE','WHEN','THEN',
  'ELSE','END','EXISTS','ANY','SOME','TOP','OFFSET','FETCH','NEXT',
  'ROWS','ONLY','WITH','RECURSIVE','TRUE','FALSE'
];
const SQL_FUNCTIONS = [
  'COUNT','SUM','AVG','MIN','MAX','UPPER','LOWER','LENGTH','TRIM',
  'SUBSTRING','CONCAT','COALESCE','IFNULL','NULLIF','CAST','CONVERT',
  'DATE_SUB','NOW','HOUR','DATE','YEAR','MONTH','DAY','DATEDIFF',
  'ROUND','ABS','MOD','REPLACE'
];

function highlightSQL(text) {
  const tokens = [];
  let remaining = text;
  while (remaining.length > 0) {
    let m = remaining.match(/^(--[^\n]*)/);
    if (m) { tokens.push({type:'cm', text:m[1]}); remaining = remaining.slice(m[1].length); continue; }
    m = remaining.match(/^('(?:[^'\\]|\\.)*')/);
    if (m) { tokens.push({type:'str', text:m[1]}); remaining = remaining.slice(m[1].length); continue; }
    m = remaining.match(/^([A-Za-z_][A-Za-z0-9_]*)/);
    if (m) {
      const word = m[1], upper = word.toUpperCase();
      if (SQL_KEYWORDS.includes(upper)) tokens.push({type:'kw', text:word});
      else if (SQL_FUNCTIONS.includes(upper)) tokens.push({type:'fn', text:word});
      else tokens.push({type:'txt', text:word});
      remaining = remaining.slice(word.length); continue;
    }
    m = remaining.match(/^(\d+(?:\.\d+)?)/);
    if (m) { tokens.push({type:'num', text:m[1]}); remaining = remaining.slice(m[1].length); continue; }
    tokens.push({type:'txt', text:remaining[0]});
    remaining = remaining.slice(1);
  }
  let html = '';
  for (const tok of tokens) {
    const safe = tok.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    switch(tok.type) {
      case 'kw': html += '<span class="hl-kw">' + safe + '</span>'; break;
      case 'fn': html += '<span class="hl-fn">' + safe + '</span>'; break;
      case 'str': html += '<span class="hl-str">' + safe + '</span>'; break;
      case 'num': html += '<span class="hl-num">' + safe + '</span>'; break;
      case 'cm': html += '<span class="hl-cm">' + safe + '</span>'; break;
      default: html += '<span class="hl-txt">' + safe + '</span>'; break;
    }
  }
  return html;
}

function setupEditor(id) {
  const input = document.getElementById('editor-input-' + id);
  const highlight = document.getElementById('editor-highlight-' + id);
  const wrap = input.closest('.editor-wrap');
  if (!input || !highlight) return;

  function sync() {
    highlight.innerHTML = highlightSQL(input.value) + '\n';
    highlight.scrollTop = input.scrollTop;
    highlight.scrollLeft = input.scrollLeft;
  }
  input.addEventListener('input', sync);
  input.addEventListener('scroll', () => { highlight.scrollTop = input.scrollTop; highlight.scrollLeft = input.scrollLeft; });
  input.addEventListener('focus', () => wrap.classList.add('focused'));
  input.addEventListener('blur', () => wrap.classList.remove('focused'));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = input.selectionStart, end = input.selectionEnd;
      input.value = input.value.substring(0, s) + '  ' + input.value.substring(end);
      input.selectionStart = input.selectionEnd = s + 2;
      sync();
    }
  });
  sync();
}

// ============================================================
// ANSWER CHECKING ENGINE
// ============================================================
const exerciseState = {};

function getExState(id) {
  if (!exerciseState[id]) exerciseState[id] = { attempts: 0, revealed: false, passed: false };
  return exerciseState[id];
}

function submitAnswer(exId) {
  const st = getExState(exId);
  if (st.passed || st.revealed) return;
  const input = document.getElementById('editor-input-' + exId);
  const userAnswer = input.value.trim();
  if (!userAnswer) return;
  const ex = getExerciseById(exId);
  if (!ex) return;

  let allPass = true, firstFailHint = '';
  for (const check of ex.checks) {
    const regex = new RegExp(check.regex, 'i');
    if (!regex.test(userAnswer)) { allPass = false; if (!firstFailHint) firstFailHint = check.hint; }
  }
  st.attempts++;

  const feedbackEl = document.getElementById('feedback-' + exId);
  const hintBtn = document.getElementById('hint-btn-' + exId);
  const submitBtn = document.getElementById('submit-btn-' + exId);

  if (allPass) {
    st.passed = true;
    feedbackEl.className = 'feedback-box feedback-correct show';
    feedbackEl.innerHTML = '<p><strong>Correct!</strong> ' + ex.correctMsg + '</p>';
    submitBtn.disabled = true;
    if (hintBtn) hintBtn.style.display = 'none';
    showAnswerBox(exId);
  } else if (st.attempts === 1) {
    feedbackEl.className = 'feedback-box feedback-wrong show';
    feedbackEl.innerHTML = '<p><strong>Not quite.</strong> Check your query and try again. Click <strong>Hint</strong> if you need a nudge.</p>';
    if (hintBtn) hintBtn.style.display = 'inline-block';
  } else {
    feedbackEl.className = 'feedback-box feedback-wrong show';
    feedbackEl.innerHTML = '<p><strong>Good effort.</strong> Let\'s look at the correct answer together:</p>';
    submitBtn.disabled = true;
    if (hintBtn) hintBtn.style.display = 'none';
    showAnswerBox(exId);
    st.revealed = true;
  }
  if (typeof saveProgress === 'function') saveProgress();
}

function showHint(exId) {
  const ex = getExerciseById(exId);
  const input = document.getElementById('editor-input-' + exId);
  const userAnswer = input.value.trim();
  let hint = ex.generalHint;
  for (const check of ex.checks) {
    const regex = new RegExp(check.regex, 'i');
    if (!regex.test(userAnswer)) { hint = check.hint; break; }
  }
  const feedbackEl = document.getElementById('feedback-' + exId);
  feedbackEl.className = 'feedback-box feedback-hint show';
  feedbackEl.innerHTML = '<p><strong>Hint:</strong> ' + hint + '</p>';
}

function revealAnswer(exId) {
  const st = getExState(exId);
  st.revealed = true;
  const submitBtn = document.getElementById('submit-btn-' + exId);
  const hintBtn = document.getElementById('hint-btn-' + exId);
  if (submitBtn) submitBtn.disabled = true;
  if (hintBtn) hintBtn.style.display = 'none';
  const feedbackEl = document.getElementById('feedback-' + exId);
  feedbackEl.className = 'feedback-box show';
  feedbackEl.innerHTML = '';
  showAnswerBox(exId);
  if (typeof saveProgress === 'function') saveProgress();
}

function showAnswerBox(exId) {
  const el = document.getElementById('answer-' + exId);
  if (el) el.classList.add('visible');
}

                <li>Checking specific IDs: <code>WHERE log_id IN (5001, 5003, 5006)</code></li>

              <p>An <strong>INNER JOIN</strong> returns only the rows where there is a match in <em>both</em> tables. If a row in table A has no matching row in table B, it's excluded from the results.</p>
              <p>The syntax:</p>
            `},
            { type:'code', content:'<span class="kw">SELECT</span> columns\n<span class="kw">FROM</span> table_a\n<span class="kw">INNER JOIN</span> table_b\n  <span class="kw">ON</span> table_a.shared_column = table_b.shared_column;' },
            { type:'html', content:`
              <p>Let's break this down:</p>
              <ul>
                <li><code>FROM table_a</code> \u2014 your starting table (the "left" table)</li>
                <li><code>INNER JOIN table_b</code> \u2014 the table you're connecting to (the "right" table)</li>
                <li><code>ON table_a.column = table_b.column</code> \u2014 the condition that links them. This is the <strong>join condition</strong> \u2014 it tells the database which rows to match.</li>
              </ul>
              <p><strong>The dot notation</strong> (<code>table.column</code>) is important. When two tables both have a column with the same name (like <code>username</code>), you need to specify <em>which table's</em> username you mean. <code>auth_log.username</code> means "the username column from the auth_log table."</p>
            `},

                <li>If no match is found, that row is <strong>skipped entirely</strong></li>
              </ol>
              <p>The word "INNER" means "only include matches." If an auth_log entry has a username that doesn't exist in the users table, it won't appear in the results.</p>

      pages: [
        // ---- PAGE 1: LEFT vs INNER ----
        {
          sections: [
            { type:'badge', cls:'badge-intro', label:'Introduction' },
            { type:'html', content:`
              <h3>The Problem with INNER JOIN</h3>
              <p>INNER JOIN only returns rows where both tables have a match. That's often what you want \u2014 but sometimes the <strong>missing matches</strong> are exactly what you're looking for:</p>
              <ul>
                <li><strong>Dormant accounts</strong> \u2014 Users who exist in the users table but have <em>no</em> login events in auth_log. These are security risks \u2014 they could be compromised without anyone noticing.</li>
                <li><strong>Unknown users</strong> \u2014 Login events from usernames that <em>don't exist</em> in the users table. This could indicate deleted accounts being targeted or external attack attempts.</li>
                <li><strong>Unmatched IPs</strong> \u2014 Comparing auth_log IPs against a watchlist \u2014 you want to see all logins, flagging the ones that <em>do</em> match the watchlist while still showing the ones that don't.</li>
              </ul>
              <p><strong>LEFT JOIN</strong> solves all of these. It returns <em>all</em> rows from the left table, even when there's no match in the right table.</p>
            `},
            { type:'badge', cls:'badge-dive', label:'Deep Dive' },
            { type:'html', content:`
              <h3>LEFT JOIN Syntax</h3>
              <p>LEFT JOIN keeps every row from the <strong>left table</strong> (the one after FROM). If a row has no match in the right table, the right table's columns are filled with <strong>NULL</strong>:</p>
            `},
            { type:'code', content:'<span class="kw">SELECT</span> left_table.col1, right_table.col2\n<span class="kw">FROM</span> left_table\n<span class="kw">LEFT JOIN</span> right_table\n  <span class="kw">ON</span> left_table.key = right_table.key;' },
            { type:'html', content:`
              <h3>INNER JOIN vs LEFT JOIN \u2014 Visual Comparison</h3>
              <p>Imagine two tables: users (6 rows) and auth_log (6 rows). Only 3 users appear in the auth_log:</p>
              <ul>

            { type:'html', content:`
              <h3>The Problem: Verbose Table Names</h3>
              <p>You've probably noticed that JOIN queries get long. Writing <code>auth_log.username</code> and <code>ip_watchlist.threat_level</code> over and over is tedious and makes queries hard to read. <strong>Aliases</strong> solve this.</p>
              <p>An <strong>alias</strong> is a short nickname you give to a table using the <code>AS</code> keyword. It lasts for the duration of that single query:</p>
            `},
            { type:'code', content:'<span class="cm">-- Without aliases (verbose)</span>\n<span class="kw">SELECT</span> auth_log.username, users.full_name, auth_log.result\n<span class="kw">FROM</span> auth_log\n<span class="kw">INNER JOIN</span> users <span class="kw">ON</span> auth_log.username = users.username;\n\n<span class="cm">-- With aliases (clean)</span>\n<span class="kw">SELECT</span> a.username, u.full_name, a.result\n<span class="kw">FROM</span> auth_log <span class="kw">AS</span> a\n<span class="kw">INNER JOIN</span> users <span class="kw">AS</span> u <span class="kw">ON</span> a.username = u.username;' },
            { type:'html', content:`
              <p>Both queries produce identical results. The alias version is shorter and easier to read. Common alias conventions:</p>
              <ul>
                <li><code>auth_log AS a</code> \u2014 first letter of the table name</li>
                <li><code>users AS u</code> \u2014 single letter</li>
                <li><code>ip_watchlist AS w</code> or <code>ip_watchlist AS iw</code> \u2014 one or two letters</li>
              </ul>
              <p><strong>Key rules:</strong></p>
              <ul>
                <li>Define the alias in FROM or JOIN: <code>FROM auth_log AS a</code></li>
                <li>Once defined, use the alias <em>everywhere</em> in the query (SELECT, ON, WHERE, ORDER BY)</li>
                <li>The <code>AS</code> keyword is actually optional: <code>FROM auth_log a</code> works too. But including AS is clearer.</li>
                <li>Aliases exist only for that query \u2014 they don't rename the actual table.</li>
              </ul>
            `},

            { type:'html', content:`
              <h3>GROUP BY \u2014 Aggregating Per Category</h3>
              <p>Aggregate functions are powerful alone, but the real magic happens when you combine them with <strong>GROUP BY</strong>. Instead of one summary for the whole table, GROUP BY gives you one summary <em>per group</em>:</p>
              <ul>
                <li><code>COUNT(*) GROUP BY username</code> \u2014 how many events <em>per user</em></li>
                <li><code>COUNT(*) GROUP BY result</code> \u2014 how many events <em>per result type</em></li>
                <li><code>COUNT(*) GROUP BY source_ip</code> \u2014 how many events <em>per IP address</em></li>
              </ul>
              <p>The syntax:</p>
            `},
            { type:'code', content:'<span class="kw">SELECT</span> column_to_group, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> event_count\n<span class="kw">FROM</span> table_name\n<span class="kw">GROUP BY</span> column_to_group;' },
            { type:'html', content:`
              <p><strong>Key rule:</strong> Every column in SELECT must either be inside an aggregate function (COUNT, SUM, etc.) OR be in the GROUP BY clause. You can't SELECT a column that isn't grouped or aggregated \u2014 the database wouldn't know which value to show for each group.</p>
              <p><strong>How GROUP BY works:</strong></p>
              <ol>
                <li>The database sorts rows into groups based on the GROUP BY column</li>
                <li>Each group becomes one output row</li>
                <li>Aggregate functions calculate within each group</li>
              </ol>
            `},

            { type:'protip', content:'<p><strong>Clause order with GROUP BY:</strong> <code>SELECT \u2192 FROM \u2192 JOIN \u2192 WHERE \u2192 GROUP BY \u2192 ORDER BY \u2192 LIMIT</code>. GROUP BY goes after WHERE but before ORDER BY. WHERE filters individual rows <em>before</em> grouping. This is important \u2014 WHERE cannot reference aggregates like COUNT(*).</p>' },

    // --- LESSON 2-1: HAVING & Advanced Aggregates ---
    {
      module: "Module 3: Security Analysis",
      title: "HAVING \u2014 Filtering Grouped Results",
      pages: [
        // ---- PAGE 1: HAVING vs WHERE ----
        {
          sections: [
            { type:'badge', cls:'badge-intro', label:'Introduction' },
            { type:'html', content:`
              <h3>The Problem WHERE Can't Solve</h3>
              <p>You've learned that WHERE filters rows <em>before</em> grouping. But what if you want to filter <em>after</em> grouping? For example:</p>
              <ul>
                <li>"Show me only users who have <strong>more than 2</strong> events" \u2014 you need to count first, then filter</li>
                <li>"Show me IPs with <strong>at least 3</strong> failed logins" \u2014 you need to count failures first, then check if the count meets a threshold</li>
              </ul>
              <p>You can't use <code>WHERE COUNT(*) > 2</code> because WHERE runs <em>before</em> GROUP BY \u2014 the counts don't exist yet. This is where <strong>HAVING</strong> comes in.</p>
            `},
            { type:'badge', cls:'badge-dive', label:'Deep Dive' },
            { type:'html', content:`
              <h3>HAVING \u2014 Filtering After GROUP BY</h3>
              <p><strong>HAVING</strong> filters groups after aggregation. It works like WHERE, but for grouped results:</p>
            `},
            { type:'code', content:'<span class="kw">SELECT</span> username, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> event_count\n<span class="kw">FROM</span> auth_log\n<span class="kw">GROUP BY</span> username\n<span class="kw">HAVING</span> <span class="fn">COUNT</span>(*) > <span class="num">1</span>;' },
            { type:'html', content:`
              <h3>WHERE vs HAVING \u2014 When to Use Each</h3>
            `},
            { type:'table', headers:['','WHERE','HAVING'],
              rows:[
                ['<strong>When it runs</strong>','Before GROUP BY','After GROUP BY'],
                ['<strong>Filters on</strong>','Individual row values','Aggregated values (COUNT, SUM, etc.)'],
                ['<strong>Can use aggregates?</strong>','No \u2014 syntax error','Yes \u2014 that\'s its purpose'],
                ['<strong>Example</strong>','<code>WHERE result = \'FAILED\'</code>','<code>HAVING COUNT(*) > 5</code>'],
              ]
            },
            { type:'html', content:`
              <p><strong>You can use both in the same query!</strong> WHERE filters rows before grouping, HAVING filters groups after:</p>
            `},
            { type:'code', content:'<span class="cm">-- Users with more than 1 FAILED login</span>\n<span class="kw">SELECT</span> username, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> fail_count\n<span class="kw">FROM</span> auth_log\n<span class="kw">WHERE</span> result = <span class="str">\'FAILED\'</span>        <span class="cm">-- filter rows first</span>\n<span class="kw">GROUP BY</span> username\n<span class="kw">HAVING</span> <span class="fn">COUNT</span>(*) > <span class="num">1</span>           <span class="cm">-- filter groups second</span>\n<span class="kw">ORDER BY</span> fail_count <span class="kw">DESC</span>;' },

            { type:'html', content:'<p style="color:var(--muted);font-size:0.85rem;">WHERE kept only FAILED rows. GROUP BY counted failures per user. HAVING kept only users with more than 1 failure. Result: admin_backup is the only user with multiple failures \u2014 our suspected compromised account.</p>' },
            { type:'protip', content:'<p><strong>Full clause order:</strong> <code>SELECT \u2192 FROM \u2192 JOIN \u2192 WHERE \u2192 GROUP BY \u2192 HAVING \u2192 ORDER BY \u2192 LIMIT</code>. HAVING goes between GROUP BY and ORDER BY. Think: WHERE filters <em>ingredients</em>, HAVING filters <em>finished dishes</em>.</p>' },
          ],
          exercises: [
            {
              id: 'ex-2-1-a',
              label: 'Exercise 1',
              context: '<strong>Table:</strong> auth_log<br><strong>Scenario:</strong> Find usernames that have more than 1 total event. These are your high-activity accounts.',
              question: 'Write a GROUP BY query on username with COUNT(*) AS event_count. Use HAVING to keep only groups where COUNT(*) > 1. Sort by event_count DESC.',

    // --- LESSON 2-2: Subqueries ---
    {
      module: "Module 3: Security Analysis",
      title: "Subqueries \u2014 Queries Inside Queries",
      pages: [
        // ---- PAGE 1: What Are Subqueries ----
        {
          sections: [
            { type:'badge', cls:'badge-intro', label:'Introduction' },
            { type:'html', content:`
              <h3>When One Query Isn't Enough</h3>
              <p>Sometimes you need the result of one query to feed into another. For example:</p>
              <ul>
                <li>"Show me all events from users who have <em>more than 2 events</em>" \u2014 first you need to find which users have >2, then query their events</li>
                <li>"Show events from the IP with the <em>most failures</em>" \u2014 first find the IP, then query its events</li>
              </ul>
              <p>A <strong>subquery</strong> (also called a nested query or inner query) is a query embedded inside another query. The inner query runs first, and its result is used by the outer query.</p>
            `},
            { type:'badge', cls:'badge-dive', label:'Deep Dive' },
            { type:'html', content:`
              <h3>Subquery in WHERE</h3>
              <p>The most common subquery pattern uses the inner query inside a WHERE clause with <strong>IN</strong>:</p>
            `},
            { type:'code', content:'<span class="cm">-- Find events for users with more than 1 event</span>\n<span class="kw">SELECT</span> *\n<span class="kw">FROM</span> auth_log\n<span class="kw">WHERE</span> username <span class="kw">IN</span> (\n  <span class="kw">SELECT</span> username\n  <span class="kw">FROM</span> auth_log\n  <span class="kw">GROUP BY</span> username\n  <span class="kw">HAVING</span> <span class="fn">COUNT</span>(*) > <span class="num">1</span>\n);' },
            { type:'html', content:`
              <p>How this works step by step:</p>
              <ol>
                <li><strong>Inner query runs first:</strong> <code>SELECT username FROM auth_log GROUP BY username HAVING COUNT(*) > 1</code> \u2192 returns <code>['admin_backup']</code></li>
                <li><strong>Result feeds into outer query:</strong> <code>WHERE username IN ('admin_backup')</code></li>
                <li><strong>Outer query runs:</strong> Returns all auth_log rows where username is admin_backup</li>
              </ol>
              <p>The inner query acts like a dynamic list. Instead of hardcoding <code>WHERE username IN ('admin_backup')</code>, the subquery figures out which usernames qualify at runtime.</p>
            `},
            { type:'badge', cls:'badge-demo', label:'Demo' },
            { type:'html', content:'<p>Find all events from the IP that has the most total events:</p>' },
            { type:'code', content:'<span class="cm">-- All events from the busiest IP</span>\n<span class="kw">SELECT</span> username, event_time, source_ip, action, result\n<span class="kw">FROM</span> auth_log\n<span class="kw">WHERE</span> source_ip = (\n  <span class="kw">SELECT</span> source_ip\n  <span class="kw">FROM</span> auth_log\n  <span class="kw">GROUP BY</span> source_ip\n  <span class="kw">ORDER BY</span> <span class="fn">COUNT</span>(*) <span class="kw">DESC</span>\n  <span class="kw">LIMIT</span> <span class="num">1</span>\n);' },
            { type:'html', content:`
              <p style="color:var(--muted);font-size:0.85rem;">The inner query finds the IP with the highest event count (203.0.113.45). The outer query then returns all events from that IP. Notice we used <code>=</code> instead of <code>IN</code> because the subquery returns exactly one value (thanks to LIMIT 1).</p>
              <p><strong>= vs IN with subqueries:</strong></p>
              <ul>
                <li><code>=</code> \u2014 when the subquery returns exactly <strong>one value</strong></li>
                <li><code>IN</code> \u2014 when the subquery returns a <strong>list of values</strong></li>
              </ul>
            `},
            { type:'protip', content:'<p><strong>Pro Tip:</strong> Subqueries can be used anywhere a value or list is expected: in WHERE, in SELECT (as a calculated column), or even in FROM (as a virtual table). The WHERE pattern is the most common and what you should master first.</p>' },
          ],
          exercises: [
            {
              id: 'ex-2-2-a',
              label: 'Exercise 1',
              context: '<strong>Table:</strong> auth_log<br><strong>Scenario:</strong> Show all events for users who have at least 1 FAILED login. Use a subquery to find the usernames first.',
              question: 'Write a query: SELECT * FROM auth_log WHERE username IN (subquery). The subquery should: SELECT username FROM auth_log WHERE result = \'FAILED\' GROUP BY username.',
              checks: [
                { regex: 'SELECT\\s+\\*', hint: 'Outer query: SELECT *' },
                { regex: 'FROM\\s+auth_log', hint: 'FROM auth_log' },
                { regex: 'WHERE\\s+username\\s+IN\\s*\\(', hint: 'WHERE username IN (subquery)' },
                { regex: "result\\s*=\\s*'FAILED'", hint: "Inner query: WHERE result = 'FAILED'" },
                { regex: 'GROUP\\s+BY\\s+username', hint: 'Inner query: GROUP BY username' },
              ],
              generalHint: 'Outer: SELECT * FROM auth_log WHERE username IN (...). Inner: find usernames with failures.',
              correctMsg: 'Subquery finds the suspect list, outer query pulls all their activity!',
              answer: '<div class="code-block"><span class="kw">SELECT</span> *\n<span class="kw">FROM</span> auth_log\n<span class="kw">WHERE</span> username <span class="kw">IN</span> (\n  <span class="kw">SELECT</span> username\n  <span class="kw">FROM</span> auth_log\n  <span class="kw">WHERE</span> result = <span class="str">\'FAILED\'</span>\n  <span class="kw">GROUP BY</span> username\n);</div><p><strong>Why:</strong> The subquery identifies which usernames have failures. The outer query returns ALL events (successes and failures) for those users. This gives you the complete activity picture for suspect accounts, not just their failures.</p>'
            }
          ]
        },

        // ---- PAGE 2: Subqueries with JOINs & Aggregates ----
        {
          sections: [
            { type:'badge', cls:'badge-dive', label:'Deep Dive \u2014 Advanced Subqueries' },
            { type:'html', content:`
              <h3>Subqueries with Aggregates</h3>
              <p>Subqueries really shine when combined with aggregate comparisons. You can compare a value against the result of an aggregate:</p>
            `},
            { type:'code', content:'<span class="cm">-- Events from users with ABOVE-AVERAGE event counts</span>\n<span class="kw">SELECT</span> username, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> event_count\n<span class="kw">FROM</span> auth_log\n<span class="kw">GROUP BY</span> username\n<span class="kw">HAVING</span> <span class="fn">COUNT</span>(*) > (\n  <span class="kw">SELECT</span> <span class="fn">AVG</span>(user_count) <span class="kw">FROM</span> (\n    <span class="kw">SELECT</span> <span class="fn">COUNT</span>(*) <span class="kw">AS</span> user_count\n    <span class="kw">FROM</span> auth_log\n    <span class="kw">GROUP BY</span> username\n  ) <span class="kw">AS</span> counts\n);' },
            { type:'html', content:`
              <p style="color:var(--muted);font-size:0.85rem;">This nested subquery first counts events per user, then calculates the average, then the outer query finds users above that average. It's a subquery within a subquery \u2014 a common pattern for statistical anomaly detection.</p>
              <h3>Subquery in SELECT</h3>
              <p>You can also use a subquery as a calculated column in SELECT. This adds context to each row:</p>
            `},
            { type:'code', content:'<span class="cm">-- Each event with the total event count for context</span>\n<span class="kw">SELECT</span> username, event_time, action,\n       (<span class="kw">SELECT</span> <span class="fn">COUNT</span>(*) <span class="kw">FROM</span> auth_log) <span class="kw">AS</span> total_events\n<span class="kw">FROM</span> auth_log;' },
            { type:'html', content:`
              <p>Each row now includes the total event count as a column. This is useful for calculating percentages or providing context: "this IP accounts for X out of Y total events."</p>
              <h3>EXISTS \u2014 Checking for Existence</h3>
              <p>The <strong>EXISTS</strong> keyword checks whether a subquery returns any rows at all. It's a true/false test:</p>
            `},
            { type:'code', content:'<span class="cm">-- Users who have at least one FAILED login</span>\n<span class="kw">SELECT</span> u.username, u.full_name, u.department\n<span class="kw">FROM</span> users <span class="kw">AS</span> u\n<span class="kw">WHERE</span> <span class="kw">EXISTS</span> (\n  <span class="kw">SELECT</span> <span class="num">1</span> <span class="kw">FROM</span> auth_log <span class="kw">AS</span> a\n  <span class="kw">WHERE</span> a.username = u.username\n    <span class="kw">AND</span> a.result = <span class="str">\'FAILED\'</span>\n);' },
            { type:'html', content:`
              <p><strong>EXISTS vs IN:</strong> Both can find matching records, but EXISTS is often faster on large datasets because it stops as soon as it finds the first match, rather than building a complete list. Use EXISTS when you just need to know <em>if</em> a match exists, not what the matches are.</p>
            `},
            { type:'protip', content:'<p><strong>Pro Tip:</strong> <code>SELECT 1</code> inside EXISTS is a convention meaning "I don\'t care what columns are returned, just check if any rows exist." You could write <code>SELECT *</code> instead and it would work identically \u2014 EXISTS only checks for row existence, not content.</p>' },
            { type:'ref', content:'<p><strong>Subquery Cheat Sheet:</strong></p><p><code>WHERE col IN (SELECT ...)</code> \u2014 match against a list from the subquery</p><p><code>WHERE col = (SELECT ... LIMIT 1)</code> \u2014 match against a single value</p><p><code>WHERE EXISTS (SELECT ...)</code> \u2014 check if any match exists</p><p><code>HAVING COUNT(*) > (SELECT AVG(...))</code> \u2014 compare against a calculated threshold</p><p><code>SELECT (SELECT ...) AS col</code> \u2014 add a calculated column</p>' },
          ],
          exercises: [

              question: 'Write a query: SELECT * FROM auth_log WHERE source_ip = (subquery). The subquery should find the source_ip with the most FAILED results: SELECT source_ip FROM auth_log WHERE result = \'FAILED\' GROUP BY source_ip ORDER BY COUNT(*) DESC LIMIT 1.',
              checks: [
                { regex: 'SELECT\\s+\\*', hint: 'Outer: SELECT *' },
                { regex: 'FROM\\s+auth_log', hint: 'FROM auth_log' },
                { regex: 'WHERE\\s+source_ip\\s*=\\s*\\(', hint: 'WHERE source_ip = (subquery)' },
                { regex: "result\\s*=\\s*'FAILED'", hint: "Inner: WHERE result = 'FAILED'" },
                { regex: 'GROUP\\s+BY\\s+source_ip', hint: 'Inner: GROUP BY source_ip' },
                { regex: 'ORDER\\s+BY.*DESC', hint: 'Inner: ORDER BY COUNT(*) DESC' },
                { regex: 'LIMIT\\s+1', hint: 'Inner: LIMIT 1 to get the top IP' },
              ],
              generalHint: 'Inner query finds the worst IP. Outer query gets all events from it.',
              correctMsg: 'Dynamic targeting! The subquery identifies the threat, the outer query pulls the evidence.',
              answer: '<div class="code-block"><span class="kw">SELECT</span> *\n<span class="kw">FROM</span> auth_log\n<span class="kw">WHERE</span> source_ip = (\n  <span class="kw">SELECT</span> source_ip\n  <span class="kw">FROM</span> auth_log\n  <span class="kw">WHERE</span> result = <span class="str">\'FAILED\'</span>\n  <span class="kw">GROUP BY</span> source_ip\n  <span class="kw">ORDER BY</span> <span class="fn">COUNT</span>(*) <span class="kw">DESC</span>\n  <span class="kw">LIMIT</span> <span class="num">1</span>\n);</div><p><strong>Why:</strong> The subquery dynamically finds the IP with the most failures. If the data changes tomorrow and a different IP becomes the worst offender, this query automatically adapts \u2014 no hardcoded values. This is the difference between a static report and a living detection tool.</p>'
            },
            {
              id: 'ex-2-2-c',
              label: 'Exercise 2',
              context: '<strong>Tables:</strong> users (u) and auth_log (a)<br><strong>Scenario:</strong> Find all users who have at least one FAILED login using EXISTS.',
              question: 'Write a query: SELECT u.username, u.full_name, u.department FROM users AS u WHERE EXISTS (SELECT 1 FROM auth_log AS a WHERE a.username = u.username AND a.result = \'FAILED\').',
              checks: [

              answer: '<div class="code-block"><span class="kw">SELECT</span> u.username, u.full_name, u.department\n<span class="kw">FROM</span> users <span class="kw">AS</span> u\n<span class="kw">WHERE</span> <span class="kw">EXISTS</span> (\n  <span class="kw">SELECT</span> <span class="num">1</span> <span class="kw">FROM</span> auth_log <span class="kw">AS</span> a\n  <span class="kw">WHERE</span> a.username = u.username\n    <span class="kw">AND</span> a.result = <span class="str">\'FAILED\'</span>\n);</div><p><strong>Correlated subquery:</strong> Notice <code>a.username = u.username</code> references the outer query\'s table (u). This makes it a "correlated" subquery \u2014 it runs once for each row in the outer query. EXISTS checks if that user has any FAILED logins. Only admin_backup qualifies.</p>'

            { type:'code', content:'<span class="kw">SELECT</span> username,\n       <span class="fn">SUBSTRING</span>(username, <span class="fn">LOCATE</span>(<span class="str">\'\\\\\'</span>, username) + <span class="num">1</span>) <span class="kw">AS</span> short_name\n<span class="kw">FROM</span> auth_log;' },

            `},

            `},

    // --- LESSON 4-2: CTEs ---
    {

            { type:'badge', cls:'badge-intro', label:'Lesson 3 \u2014 The Readability Revolution' },
            { type:'html', content:`
              <h3>The Problem CTEs Solve</h3>
              <p>By now you\'ve probably noticed something: as queries get more powerful, they get less readable. A subquery inside a JOIN inside another subquery becomes a tangled ball of parentheses that even the person who wrote it can\'t debug a week later.</p>
              <p><strong>CTEs (Common Table Expressions)</strong>, also called <strong>WITH clauses</strong>, solve this. A CTE lets you name an intermediate query result and use it later, like a temporary table that exists only for the duration of your statement.</p>
              <h3>The Pattern</h3>
            `},
            { type:'code', content:'<span class="kw">WITH</span> step_one <span class="kw">AS</span> (\n  <span class="kw">SELECT</span> ...\n  <span class="kw">FROM</span> ...\n  <span class="kw">WHERE</span> ...\n),\nstep_two <span class="kw">AS</span> (\n  <span class="kw">SELECT</span> ...\n  <span class="kw">FROM</span> step_one\n  <span class="kw">WHERE</span> ...\n)\n<span class="kw">SELECT</span> *\n<span class="kw">FROM</span> step_two;' },
            { type:'html', content:`
              <p>Read top-down: <em>"First, give me step_one. Then build step_two using step_one. Finally, return step_two."</em> Each block has a clear name and a clear purpose. No nested parentheses.</p>
              <h3>Side-by-Side Comparison</h3>
              <p>The Module 3 challenge query:</p>
            `},
            { type:'code', content:'<span class="cmt">-- WITHOUT a CTE (the old way)</span>\n<span class="kw">SELECT</span> *\n<span class="kw">FROM</span> auth_log\n<span class="kw">WHERE</span> source_ip = (\n  <span class="kw">SELECT</span> source_ip\n  <span class="kw">FROM</span> auth_log\n  <span class="kw">WHERE</span> result = <span class="str">\'FAILED\'</span>\n  <span class="kw">GROUP BY</span> source_ip\n  <span class="kw">ORDER BY</span> <span class="fn">COUNT</span>(*) <span class="kw">DESC</span>\n  <span class="kw">LIMIT</span> <span class="num">1</span>\n);' },
            { type:'html', content:`<p>The same query rewritten with a CTE:</p>` },
            { type:'code', content:'<span class="cmt">-- WITH a CTE (the readable way)</span>\n<span class="kw">WITH</span> worst_ip <span class="kw">AS</span> (\n  <span class="kw">SELECT</span> source_ip\n  <span class="kw">FROM</span> auth_log\n  <span class="kw">WHERE</span> result = <span class="str">\'FAILED\'</span>\n  <span class="kw">GROUP BY</span> source_ip\n  <span class="kw">ORDER BY</span> <span class="fn">COUNT</span>(*) <span class="kw">DESC</span>\n  <span class="kw">LIMIT</span> <span class="num">1</span>\n)\n<span class="kw">SELECT</span> *\n<span class="kw">FROM</span> auth_log\n<span class="kw">WHERE</span> source_ip <span class="kw">IN</span> (<span class="kw">SELECT</span> source_ip <span class="kw">FROM</span> worst_ip);' },
            { type:'html', content:`<p>Same logic. But the CTE version reads like English: "First, find the worst IP. Then get all events from it." When you come back to this query in 6 months, you\'ll thank yourself.</p>` },
            { type:'protip', content:'<p><strong>Pro Tip:</strong> CTEs are <em>chainable</em>. You can define multiple CTEs in one WITH clause, separated by commas, where each one can reference the ones above it. This is how you build multi-step analytics pipelines without writing temp tables.</p>' },

            { type:'html', content:`
              <h3>Chaining Multiple CTEs</h3>
              <p>The real power of CTEs shows up when you chain them. Each named block does one thing, and the next block builds on it. Here\'s a 3-step threat-hunt pipeline:</p>
            `},
            { type:'code', content:'<span class="kw">WITH</span>\n<span class="cmt">-- Step 1: identify all suspicious IPs (>= 5 failures)</span>\nsuspicious_ips <span class="kw">AS</span> (\n  <span class="kw">SELECT</span> source_ip, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> fail_count\n  <span class="kw">FROM</span> auth_log\n  <span class="kw">WHERE</span> result = <span class="str">\'FAILED\'</span>\n  <span class="kw">GROUP BY</span> source_ip\n  <span class="kw">HAVING</span> <span class="fn">COUNT</span>(*) >= <span class="num">5</span>\n),\n<span class="cmt">-- Step 2: find every successful login that came from those IPs</span>\nbreaches <span class="kw">AS</span> (\n  <span class="kw">SELECT</span> a.username, a.source_ip, a.event_time\n  <span class="kw">FROM</span> auth_log <span class="kw">AS</span> a\n  <span class="kw">INNER JOIN</span> suspicious_ips <span class="kw">AS</span> s\n    <span class="kw">ON</span> a.source_ip = s.source_ip\n  <span class="kw">WHERE</span> a.result = <span class="str">\'SUCCESS\'</span>\n)\n<span class="cmt">-- Step 3: enrich with user details</span>\n<span class="kw">SELECT</span> b.event_time, b.username, u.full_name,\n       u.department, u.role, b.source_ip\n<span class="kw">FROM</span> breaches <span class="kw">AS</span> b\n<span class="kw">INNER JOIN</span> users <span class="kw">AS</span> u\n  <span class="kw">ON</span> b.username = u.username;' },
            { type:'html', content:`
              <p>This is one query, but it tells a three-act story. <strong>Without CTEs</strong>, this would be a deeply nested mess of subqueries with derived tables and aliases. <strong>With CTEs</strong>, each step is named, isolated, and easy to debug \u2014 you can comment out the final SELECT and replace it with <code>SELECT * FROM suspicious_ips</code> to see what step 1 produced.</p>
              <h3>When to Use CTEs</h3>

                <li>Any time you have a subquery used more than once \u2014 use a CTE instead</li>
                <li>Any time you have nesting more than 2 levels deep</li>
                <li>Any time you need to debug a complex query (CTEs let you "swap out" the final SELECT to inspect each step)</li>
                <li>Any time the next analyst on your team will need to read your query</li>

    // --- LESSON 4-3: WINDOW FUNCTIONS ---
    {
      module: "Module 4: Advanced SQL",
      title: "Window Functions \u2014 SQL\'s Crown Jewel",
      pages: [
        // ---- PAGE 1: What Are Window Functions? ----
        {
          sections: [
            { type:'badge', cls:'badge-intro', label:'Lesson 4 \u2014 The Big One' },
            { type:'html', content:`
              <h3>What Window Functions Do</h3>
              <p>Up to this point, every query you\'ve written treats each row in isolation, OR collapses many rows into a single aggregate (with GROUP BY). <strong>Window functions</strong> give you a third option: keep every row, but compute values that depend on <em>other rows</em>.</p>
              <p>Examples of questions only window functions can answer:</p>
              <ul>
                <li>"For each login event, what was the <em>previous</em> login by that same user?"</li>
                <li>"Rank each user\'s logins by time, so I can see their 1st, 2nd, 3rd login."</li>
                <li>"What\'s the running total of failed logins per IP, ordered by time?"</li>
                <li>"How many minutes elapsed between this login and the user\'s previous one?"</li>
              </ul>
              <p>That last question is the foundation of <strong>impossible-travel detection</strong> \u2014 the technique your team lead asked you to build.</p>
              <h3>The Pattern</h3>
            `},
            { type:'code', content:'window_function() <span class="kw">OVER</span> (\n  <span class="kw">PARTITION BY</span> column_to_group_by\n  <span class="kw">ORDER BY</span> column_to_order_by\n)' },
            { type:'html', content:`
              <p>The <code>OVER</code> clause is what makes a function a window function. Inside OVER you tell SQL:</p>
              <ul>
                <li><strong>PARTITION BY</strong> \u2014 split rows into groups (like GROUP BY, but rows aren\'t collapsed)</li>
                <li><strong>ORDER BY</strong> \u2014 within each group, what order should rows be in?</li>
              </ul>
              <p>The window function then runs once per row, with access to the other rows in the same partition.</p>
            `},
            { type:'protip', content:'<p><strong>Pro Tip:</strong> The phrase "PARTITION BY" doesn\'t mean what GROUP BY means. GROUP BY collapses rows. PARTITION BY <em>keeps</em> every row \u2014 it just tells the window function which rows count as "neighbors" for the calculation.</p>' },
          ],
          exercises: []
        },

        // ---- PAGE 2: ROW_NUMBER and RANK ----
        {
          sections: [
            { type:'badge', cls:'badge-dive', label:'Deep Dive \u2014 ROW_NUMBER' },
            { type:'html', content:`
              <h3>ROW_NUMBER() \u2014 Numbering Rows</h3>
              <p><code>ROW_NUMBER()</code> assigns a sequential number to each row within its partition, ordered by your chosen column. Think of it as "the 1st, 2nd, 3rd... event for each user."</p>
            `},
            { type:'code', content:'<span class="kw">SELECT</span> username, event_time, source_ip,\n  <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (\n    <span class="kw">PARTITION BY</span> username\n    <span class="kw">ORDER BY</span> event_time\n  ) <span class="kw">AS</span> login_number\n<span class="kw">FROM</span> auth_log\n<span class="kw">WHERE</span> result = <span class="str">\'SUCCESS\'</span>;' },
            { type:'html', content:`
              <p>The result: every successful login, plus a column showing whether it was that user\'s 1st, 2nd, 3rd, ... login. <strong>Rows are not collapsed.</strong> You still see every event \u2014 just with extra context.</p>
              <h3>Why This Is Powerful</h3>
              <p>Combine ROW_NUMBER with a subquery (or CTE!) to do "top N per group" \u2014 a question that\'s extremely hard without window functions:</p>
            `},
            { type:'code', content:'<span class="cmt">-- Get only each user\'s FIRST successful login</span>\n<span class="kw">WITH</span> numbered <span class="kw">AS</span> (\n  <span class="kw">SELECT</span> username, event_time, source_ip,\n    <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (\n      <span class="kw">PARTITION BY</span> username <span class="kw">ORDER BY</span> event_time\n    ) <span class="kw">AS</span> rn\n  <span class="kw">FROM</span> auth_log\n  <span class="kw">WHERE</span> result = <span class="str">\'SUCCESS\'</span>\n)\n<span class="kw">SELECT</span> username, event_time, source_ip\n<span class="kw">FROM</span> numbered\n<span class="kw">WHERE</span> rn = <span class="num">1</span>;' },
            { type:'html', content:`<p>This is the canonical "first event per group" pattern. Change <code>WHERE rn = 1</code> to <code>WHERE rn &lt;= 3</code> and you get the first three events per user.</p>` },
            { type:'protip', content:'<p><strong>Pro Tip:</strong> <code>RANK()</code> and <code>DENSE_RANK()</code> are siblings of ROW_NUMBER. RANK leaves gaps after ties (1, 2, 2, 4) and DENSE_RANK doesn\'t (1, 2, 2, 3). For "top N per group" queries you almost always want ROW_NUMBER.</p>' },
          ],
          exercises: [
            {
              id: 'ex-3-3-a',
              label: 'Exercise 1',
              context: '<strong>Threat hunt question:</strong> "Show me only each user\'s FIRST successful login \u2014 I want to know when each account was first used."',
              question: 'Use a CTE with ROW_NUMBER() OVER (PARTITION BY username ORDER BY event_time) AS rn from auth_log WHERE result = \'SUCCESS\'. Then SELECT username, event_time, source_ip FROM the CTE WHERE rn = 1.',

                { regex: 'PARTITION\\s+BY\\s+username', hint: 'PARTITION BY username' },
                { regex: 'ORDER\\s+BY\\s+event_time', hint: 'ORDER BY event_time' },

                { regex: "result\\s*=\\s*'SUCCESS'", hint: "Inner: WHERE result = 'SUCCESS'" },

              ],
              generalHint: 'CTE adds ROW_NUMBER() OVER (PARTITION BY username ORDER BY event_time) AS rn. Outer query filters WHERE rn = 1.',
              correctMsg: 'First-event-per-group with a window function \u2014 a senior-analyst-level technique.',
              answer: '<div class="code-block"><span class="kw">WITH</span> numbered <span class="kw">AS</span> (\n  <span class="kw">SELECT</span> username, event_time, source_ip,\n    <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (\n      <span class="kw">PARTITION BY</span> username\n      <span class="kw">ORDER BY</span> event_time\n    ) <span class="kw">AS</span> rn\n  <span class="kw">FROM</span> auth_log\n  <span class="kw">WHERE</span> result = <span class="str">\'SUCCESS\'</span>\n)\n<span class="kw">SELECT</span> username, event_time, source_ip\n<span class="kw">FROM</span> numbered\n<span class="kw">WHERE</span> rn = <span class="num">1</span>;</div><p><strong>Why:</strong> This is the canonical "top 1 per group" pattern. ROW_NUMBER assigns 1 to the earliest event per user; the outer filter keeps only those rows. You can\'t do this with GROUP BY alone \u2014 it would collapse the rows and lose source_ip. Window functions keep the row intact while letting you rank.</p>'

        // ---- PAGE 3: LAG and LEAD ----
        {
          sections: [
            { type:'badge', cls:'badge-dive', label:'Deep Dive \u2014 LAG and LEAD' },
            { type:'html', content:`
              <h3>LAG() and LEAD() \u2014 Looking at Neighboring Rows</h3>
              <p><code>LAG(column)</code> returns the value of <code>column</code> from the <strong>previous row</strong> in the partition. <code>LEAD(column)</code> returns the value from the <strong>next row</strong>. Both respect your PARTITION BY and ORDER BY.</p>
            `},
            { type:'code', content:'<span class="kw">SELECT</span> username, event_time, source_ip,\n  <span class="fn">LAG</span>(event_time) <span class="kw">OVER</span> (\n    <span class="kw">PARTITION BY</span> username\n    <span class="kw">ORDER BY</span> event_time\n  ) <span class="kw">AS</span> previous_login_time,\n  <span class="fn">LAG</span>(source_ip) <span class="kw">OVER</span> (\n    <span class="kw">PARTITION BY</span> username\n    <span class="kw">ORDER BY</span> event_time\n  ) <span class="kw">AS</span> previous_login_ip\n<span class="kw">FROM</span> auth_log\n<span class="kw">WHERE</span> result = <span class="str">\'SUCCESS\'</span>;' },
            { type:'html', content:`
              <p>For each successful login, this query attaches <em>the previous successful login\'s time and IP for that same user</em> as new columns. Read across one row and you can see "this login at 09:14:22 from 10.0.5.7, and the previous login was at 09:11:08 from 47.92.13.4."</p>
              <h3>Why This Is the Crown Jewel</h3>
              <p>Once you have current-row and previous-row data side by side, you can compute things that were nearly impossible before:</p>
              <ul>
                <li><strong>Time delta</strong> \u2014 minutes between this login and the previous one</li>
                <li><strong>IP change</strong> \u2014 did the source IP change between consecutive logins?</li>

function getExerciseById(exId) {
  for (const mod of lessons) {
    for (const lesson of mod) {
      if (!lesson.pages) continue;
      for (const page of lesson.pages) {
        if (!page.exercises) continue;
        for (const ex of page.exercises) {
          if (ex.id === exId) return ex;
        }
      }
    }
  }
  return null;
}

// ============================================================
const STORAGE_KEY = 'cic_sql_sandbox_progress_v1';
let saveIndicatorTimer = null;

function saveProgress() {
  try {
    const existingRaw = localStorage.getItem(STORAGE_KEY);
    const existing = existingRaw ? (JSON.parse(existingRaw) || {}) : {};
    const data = {
      v: 1,
      currentModule, currentLesson, currentPage,
      completed: Array.from(completed),
      visitedPages: Array.from(visitedPages),
      exerciseState,
      savedAt: Date.now(),
      lastSeenAt: Date.now(),
      welcomeSeen: existing.welcomeSeen === true
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    flashSaveIndicator();
  } catch (e) {
    // localStorage may be unavailable (private mode, quota) — fail silently
    console.warn('Progress save failed:', e);
  }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data || data.v !== 1) return false;

    // Validate position is still within bounds (in case lessons were added/removed)
    if (lessons[data.currentModule] && lessons[data.currentModule][data.currentLesson]
        && lessons[data.currentModule][data.currentLesson].pages[data.currentPage]) {
      currentModule = data.currentModule;
      currentLesson = data.currentLesson;
      currentPage = data.currentPage;
    }
    if (Array.isArray(data.completed)) data.completed.forEach(k => completed.add(k));
    if (Array.isArray(data.visitedPages)) data.visitedPages.forEach(k => visitedPages.add(k));
    if (data.exerciseState && typeof data.exerciseState === 'object') {
      Object.keys(data.exerciseState).forEach(k => { exerciseState[k] = data.exerciseState[k]; });
    }
    return true;
  } catch (e) {
    console.warn('Progress load failed:', e);
    return false;
  }
}

function resetProgress() {
  if (!confirm('Erase all saved progress and start over from Module 1, Lesson 1? This cannot be undone.')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  Object.keys(exerciseState).forEach(k => delete exerciseState[k]);
  completed.clear();
  visitedPages.clear();
  currentModule = 0; currentLesson = 0; currentPage = 0;
  document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('done'));
  renderPage(0, 0, 0);
  // Re-show welcome modal after reset
  showWelcome();
}

function flashSaveIndicator() {
  const el = document.getElementById('save-indicator');

  el.classList.add('visible');
  if (saveIndicatorTimer) clearTimeout(saveIndicatorTimer);
  saveIndicatorTimer = setTimeout(() => el.classList.remove('visible'), 1400);
}

function updateHeaderProgress() {

  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  el.textContent = `${done} / ${total} lessons \u2014 ${pct}% complete`;
}

function formatRelativeTime(ts) {
  if (!ts) return 'never';
  const diffMs = Date.now() - ts;
  if (diffMs < 0) return 'just now';
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return diffMin === 1 ? '1 minute ago' : `${diffMin} minutes ago`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr === 1 ? '1 hour ago' : `${diffHr} hours ago`;
  const diffDay = Math.floor(diffHr / 24);
  if (diffDay < 30) return diffDay === 1 ? '1 day ago' : `${diffDay} days ago`;
  const diffMonth = Math.floor(diffDay / 30);
  if (diffMonth < 12) return diffMonth === 1 ? '1 month ago' : `${diffMonth} months ago`;
  const diffYear = Math.floor(diffMonth / 12);
  return diffYear === 1 ? '1 year ago' : `${diffYear} years ago`;
}

  // Count total lessons across all modules
  let total = 0;
  for (let i = 0; i < lessonNames.length; i++) total += lessonNames[i].length;
  const lessonsDone = completed.size;
  // Count exercises marked passed
  let exercisesSolved = 0;
  Object.keys(exerciseState).forEach(k => {
    if (exerciseState[k] && exerciseState[k].passed) exercisesSolved++;
  });
  // Read lastSeenAt from saved data
  let lastSeen = 'never';
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data && data.lastSeenAt) lastSeen = formatRelativeTime(data.lastSeenAt);
    }
  } catch (e) {}
  return { lessonsDone, totalLessons: total, exercisesSolved, lastSeenRelative: lastSeen };
}

function hasExistingProgress() {
  if (completed.size > 0) return true;
  for (const k of Object.keys(exerciseState)) {
    if (exerciseState[k] && (exerciseState[k].passed || exerciseState[k].revealed)) return true;
  }
  return false;
}

function dismissWelcome(action) {
  const overlay = document.getElementById('welcome-overlay');

  try {

function renderSection(s) {
  switch(s.type) {
    case 'badge': return `<span class="badge ${s.cls}">${s.label}</span>`;
    case 'html': return `<div class="section-block">${s.content}</div>`;
    case 'code': return `<div class="code-block">${s.content}</div>`;
    case 'scenario': return `<div class="scenario-box">${s.content}</div>`;
    case 'protip': return `<div class="protip-box"><span class="badge badge-protip">Pro Tip</span><br><br>${s.content}</div>`;
    case 'ref': return `<div class="ref-box"><span class="badge badge-ref">Quick Reference</span><br><br>${s.content}</div>`;
    case 'divider': return '<hr class="divider">';
    case 'table':
      let t = '<div class="data-table-wrap"><table class="data-table"><tr>';
      s.headers.forEach(h => t += `<th>${h}</th>`);
      t += '</tr>';
      s.rows.forEach(r => { t += '<tr>'; r.forEach(c => t += `<td>${c}</td>`); t += '</tr>'; });
      t += '</table></div>';
      return t;
    default: return '';
  }
}
